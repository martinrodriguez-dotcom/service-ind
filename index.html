<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gestion de Equipos BND | Gestión Profesional de Activos</title>
    
    <!-- LIBRERÍAS CORE -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS PARA GENERACIÓN DE PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --emerald: #10b981;
            --rose: #f43f5e;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-light); 
            color: #1e293b; 
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        .dark body { background-color: #020617; color: #f1f5f9; }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.85);
            border-color: rgba(30, 41, 59, 0.8);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .btn-modern {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s;
        }

        .btn-modern:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-modern:active { transform: scale(0.98); }

        .input-modern {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .dark .input-modern { background: #1e293b; color: white; }

        .input-modern:focus {
            background: white;
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .dark .input-modern:focus { background: #0f172a; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }
        .history-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }
        .dark .history-table td {
            border-bottom-color: rgba(30, 41, 59, 0.5);
        }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>

    <!-- CONFIGURACIÓN FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "", // Proporcionada por el entorno
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.db = db;
            window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query };
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Error al inicializar Firebase:", error);
        }
    </script>

    <!-- LÓGICA DE LA APLICACIÓN -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SISTEMA DE ICONOS SVG NATIVOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 11h7v10H3V11z" strokeWidth="2"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" strokeWidth="2.5"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" strokeWidth="2"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2" strokeWidth="2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z" strokeWidth="2"/>,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeWidth="2"/>,
                chevronLeft: <path d="M15 18l-6-6 6-6" strokeWidth="2.5"/>,
                x: <path d="M18 6L6 18M6 6l12 12" strokeWidth="2.5"/>,
                check: <path d="M20 6L9 17l-5-5" strokeWidth="2.5"/>,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" strokeWidth="2"/></React.Fragment>,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                hash: <path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18" strokeWidth="2"/>,
                fuel: <React.Fragment><path d="M3 22V8c0-2.1 1.7-3.8 3.8-3.8h7.5c2.1 0 3.8 1.7 3.8 3.8v14M4 9h13"/><path d="M19 8h1a2 2 0 012 2v6a2 2 0 01-2 2h-1M19 18h2"/><circle cx="10" cy="13" r="3"/></React.Fragment>,
                history: <React.Fragment><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 11.5 4m-.5 5v-5h5"/></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"/>
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const SERVICE_INTERVAL_DEFAULT = 250;

        // --- FUNCIÓN DE GENERACIÓN DE PDF PROFESIONAL ---
        const downloadVehiclePDF = (company, vehicle) => {
            if (!window.jspdf) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const interval = vehicle.serviceInterval || SERVICE_INTERVAL_DEFAULT;
            const hsConsumidas = (vehicle.horometroTotal || 0) - (vehicle.ultimoServiceHoras || 0);
            const progress = Math.max(0, 100 - (hsConsumidas / interval * 100));

            // Estética de cabecera
            doc.setFillColor(79, 70, 229);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("EXPEDIENTE TÉCNICO DE MANTENIMIENTO", 15, 20);
            doc.setFontSize(10);
            doc.text(`ServicePro EAM - Reporte generado el: ${new Date().toLocaleDateString()}`, 15, 30);

            doc.setTextColor(30, 41, 59);
            doc.setFontSize(14);
            doc.text("Información del Activo Industrial", 15, 55);
            doc.setFontSize(10);
            doc.text(`Empresa: ${company.nombre}`, 15, 65);
            doc.text(`Identificación: ${vehicle.nombre} (${vehicle.marca || '-'} ${vehicle.modelo || '-'})`, 15, 71);
            doc.text(`Número de Serie: ${vehicle.serie || 'S/N'}`, 110, 65);
            doc.text(`Horómetro Actual: ${vehicle.horometroTotal} HS`, 110, 71);

            doc.setFontSize(12);
            doc.text(`Vida útil de ciclo restante: ${progress.toFixed(1)}%`, 15, 85);

            // Preparación de tabla
            const tableData = (vehicle.eventos || []).slice().reverse().map(ev => [
                ev.fecha, 
                ev.tipo, 
                `${ev.horas || '-'} HS`, 
                ev.litros ? `${ev.litros} Lts` : '-',
                ev.nota || ev.motivo || (ev.insumos ? ev.insumos.join(', ') : '-')
            ]);

            doc.autoTable({
                startY: 95,
                head: [['Fecha', 'Evento', 'Horómetro', 'Carga', 'Detalle Técnico / Insumos']],
                body: tableData,
                headStyles: { fillColor: [79, 70, 229] },
                styles: { fontSize: 8, cellPadding: 3 },
                columnStyles: { 4: { cellWidth: 80 } }
            });

            doc.save(`Reporte_${vehicle.nombre.replace(/\s+/g, '_')}.pdf`);
        };

        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fade-in">
                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={onClose} />
                <div className="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                    <div className="px-8 py-6 border-b dark:border-slate-800 flex justify-between items-center bg-white/50 dark:bg-slate-900/50">
                        <h3 className="text-xl font-extrabold text-slate-800 dark:text-white tracking-tight uppercase italic leading-none">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all text-slate-400">
                            <Icon name="x" size={24} />
                        </button>
                    </div>
                    <div className="p-8 max-h-[85vh] overflow-y-auto">
                        {children}
                    </div>
                </div>
            </div>
        );

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompanyId, setSelectedCompanyId] = useState(null);
            const [darkMode, setDarkMode] = useState(false);
            const [loading, setLoading] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [expandedVehicles, setExpandedVehicles] = useState(new Set());
            
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            
            const [form, setForm] = useState({ 
                nombre: '', cuit: '', responsable: '', mail: '', tel: '',
                marca: '', modelo: '', serie: '', año: '', serviceInterval: 250, 
                horometro: '', horas: '', litros: '', nota: '', motivo: '',
                insumos: [], insumoManual: ''
            });

            // Sincronización en tiempo real con Firebase
            const startSync = useCallback(() => {
                if (!window.fb || !window.db) return;
                const q = window.fb.query(window.fb.collection(window.db, "companies"));
                return window.fb.onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCompanies(data);
                    setLoading(false);
                }, (err) => { 
                    console.error("Firebase Error:", err); 
                    setLoading(false); 
                });
            }, []);

            useEffect(() => {
                if (window.fb && window.db) startSync();
                else window.addEventListener('firebase-ready', startSync);
                return () => window.removeEventListener('firebase-ready', startSync);
            }, [startSync]);

            // Derivamos la empresa activa del estado global para actualización instantánea
            const activeCompany = useMemo(() => 
                companies.find(c => c.id === selectedCompanyId), 
            [companies, selectedCompanyId]);

            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const interval = veh.serviceInterval || SERVICE_INTERVAL_DEFAULT;
                        const rest = interval - ((veh.horometroTotal || 0) - (veh.ultimoServiceHoras || 0));
                        if (rest < 50 || !veh.operativo) {
                            list.push({ ...veh, companyId: emp.id, companyName: emp.nombre, rest });
                        }
                    });
                });
                return list.sort((a,b) => a.rest - b.rest);
            }, [companies]);

            const toggleHistory = (id) => {
                const newSet = new Set(expandedVehicles);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setExpandedVehicles(newSet);
            };

            // Handlers Firebase
            const handleAddCompany = async () => {
                if(!form.nombre) return;
                await window.fb.addDoc(window.fb.collection(window.db, "companies"), { 
                    nombre: form.nombre, cuit: form.cuit, responsable: form.responsable, vehiculos: [] 
                });
                setModalType(null); setForm({ serviceInterval: 250, insumos: [] });
            };

            const handleAddVehicle = async () => {
                if(!form.nombre || !activeCompany) return;
                const ref = window.fb.doc(window.db, "companies", activeCompany.id);
                const h = parseFloat(form.horometro) || 0;
                const v = { 
                    id: Date.now(), 
                    nombre: form.nombre.toUpperCase(),
                    marca: form.marca,
                    modelo: form.modelo,
                    serie: form.serie,
                    serviceInterval: parseInt(form.serviceInterval) || 250,
                    horometroTotal: h, 
                    ultimoServiceHoras: h, 
                    operativo: true, 
                    eventos: [{ tipo: 'ALTA', fecha: new Date().toLocaleDateString(), horas: h, nota: 'Vinculación a flota' }] 
                };
                await window.fb.updateDoc(ref, { vehiculos: window.fb.arrayUnion(v) });
                setModalType(null); setForm({ serviceInterval: 250, insumos: [] });
            };

            const handleDailyLog = async () => {
                const h = parseFloat(form.horas);
                if (isNaN(h) || !activeCompany) return;
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { 
                    ...v, horometroTotal: h,
                    eventos: [...(v.eventos || []), { tipo: 'REGISTRO', fecha: new Date().toLocaleDateString(), horas: h, litros: form.litros, nota: form.nota }]
                } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({ serviceInterval: 250, insumos: [] });
            };

            const handleToggleStatus = async (vehicleId, currentStatus) => {
                if(currentStatus) { setActiveVehicleId(vehicleId); setModalType('downtime'); }
                else {
                    const updated = activeCompany.vehiculos.map(v => v.id === vehicleId ? { ...v, operativo: true, eventos: [...v.eventos, { tipo: 'ALTA', fecha: new Date().toLocaleDateString(), nota: 'Reactivación' }] } : v);
                    await window.fb.updateDoc(window.fb.doc(window.db, "companies", activeCompany.id), { vehiculos: updated });
                }
            };

            const handleConfirmDowntime = async () => {
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, operativo: false, eventos: [...v.eventos, { tipo: 'BAJA', fecha: new Date().toLocaleDateString(), motivo: form.motivo }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({ serviceInterval: 250, insumos: [] });
            };

            const handleServiceReset = async () => {
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, ultimoServiceHoras: v.horometroTotal, eventos: [...v.eventos, { tipo: 'SERVICE', fecha: new Date().toLocaleDateString(), horas: v.horometroTotal, insumos: form.insumos, nota: form.nota }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({ serviceInterval: 250, insumos: [] });
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className={darkMode ? 'dark' : ''}>
                    <div className="flex h-screen bg-slate-50 dark:bg-slate-950 transition-colors">
                        
                        {/* SIDEBAR */}
                        <aside className="w-20 lg:w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-6 flex flex-col">
                            <div className="flex items-center gap-3 mb-12 px-2 text-indigo-600">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-lg">
                                    <Icon name="wrench" size={24}/>
                                </div>
                                <h1 className="hidden lg:block text-xl font-extrabold text-slate-800 dark:text-white tracking-tighter uppercase italic leading-none">ServicePro</h1>
                            </div>
                            
                            <nav className="space-y-2 flex-1">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
                                    { id: 'companies', label: 'Empresas', icon: 'company' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => {setActiveTab(item.id); setSelectedCompanyId(null);}} 
                                        className={`w-full p-4 rounded-2xl flex items-center gap-4 font-bold text-sm transition-all ${activeTab === item.id ? 'btn-modern' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                                        <Icon name={item.icon}/> <span className="hidden lg:block">{item.label}</span>
                                    </button>
                                ))}
                            </nav>

                            <button onClick={() => setDarkMode(!darkMode)} className="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center lg:justify-between text-slate-500 hover:text-indigo-600 transition-colors">
                                <Icon name="settings"/> <span className="hidden lg:block text-[10px] font-black uppercase tracking-widest">{darkMode ? 'Oscuro' : 'Claro'}</span>
                            </button>
                        </aside>

                        {/* MAIN CONTENT */}
                        <main className="flex-1 p-8 lg:p-12 overflow-y-auto relative">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-600/5 blur-[120px] pointer-events-none"></div>

                            {activeTab === 'dashboard' && (
                                <div className="max-w-5xl mx-auto space-y-10 animate-fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight italic leading-none uppercase">Monitor de Alertas</h2>
                                        <span className="bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-rose-100">{alerts.length} Incidencias</span>
                                    </div>

                                    <div className="grid gap-4">
                                        {alerts.map((a, i) => (
                                            <div key={i} className="glass-card p-6 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-6 group transition-all">
                                                <div className="flex items-center gap-6">
                                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${a.operativo ? 'bg-amber-100 dark:bg-amber-900/20 text-amber-600' : 'bg-rose-100 dark:bg-rose-900/20 text-rose-600 animate-pulse'}`}>
                                                        <Icon name="alert" size={28}/>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-lg font-extrabold text-slate-800 dark:text-white uppercase italic leading-none mb-1">{a.nombre}</h4>
                                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest leading-none">{a.companyName}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    {a.operativo ? (
                                                        <div className="space-y-1">
                                                            <p className="text-2xl font-black text-amber-600 italic">-{a.rest.toFixed(1)} HS</p>
                                                            <p className="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Tiempo de Ciclo</p>
                                                        </div>
                                                    ) : (
                                                        <p className="text-xs font-black text-rose-600 uppercase tracking-widest border border-rose-100 px-3 py-1 rounded-lg">Fuera de Servicio</p>
                                                    )}
                                                </div>
                                                <button onClick={() => { setSelectedCompanyId(a.companyId); setActiveTab('companies'); }} className="p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">Ver Detalle</button>
                                            </div>
                                        ))}
                                        {alerts.length === 0 && (
                                            <div className="py-24 text-center glass-card rounded-[3rem] border-dashed border-2">
                                                <div className="bg-emerald-50 dark:bg-emerald-900/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto text-emerald-500 mb-6"><Icon name="check" size={32}/></div>
                                                <p className="font-extrabold text-slate-800 dark:text-white uppercase tracking-widest text-sm italic">Flota Operativa al 100%</p>
                                                <p className="text-slate-400 text-xs mt-2 font-semibold italic opacity-60">No hay equipos con alertas críticas activas.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'companies' && !activeCompany && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-fade-in">
                                    <div className="flex justify-between items-end border-b-2 border-slate-200 dark:border-slate-800 pb-8">
                                        <h2 className="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight italic leading-none uppercase">Directorio</h2>
                                        <button onClick={() => setModalType('company')} className="btn-modern px-8 py-3.5 rounded-2xl flex items-center gap-2 italic shadow-lg">
                                            <Icon name="plus"/> Nueva Empresa
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {companies.map(emp => (
                                            <div key={emp.id} onClick={() => setSelectedCompanyId(emp.id)} className="glass-card p-8 cursor-pointer group flex flex-col min-h-[220px]">
                                                <div className="w-12 h-12 rounded-xl bg-indigo-50 dark:bg-slate-800 flex items-center justify-center text-indigo-600 mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner">
                                                    <Icon name="company" size={24}/>
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-1 leading-tight group-hover:text-indigo-600 transition-colors uppercase italic leading-none">{emp.nombre}</h3>
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">CUIT {emp.cuit}</p>
                                                <div className="mt-auto pt-6 border-t dark:border-slate-800 flex justify-between items-center">
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">{emp.vehiculos?.length || 0} Assets Registrados</span>
                                                    <Icon name="chevronLeft" className="rotate-180 text-slate-300"/>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeCompany && (
                                <div className="max-w-6xl mx-auto space-y-10 animate-in slide-in-from-right-4 duration-500">
                                    <button onClick={() => setSelectedCompanyId(null)} className="flex items-center gap-2 text-indigo-600 font-bold text-xs uppercase tracking-widest hover:translate-x-[-4px] transition-all">
                                        <Icon name="chevronLeft"/> Volver al Directorio
                                    </button>
                                    
                                    <div className="bg-white dark:bg-slate-900 p-10 rounded-[3rem] border border-slate-200 dark:border-slate-800 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-8 shadow-sm">
                                        <div className="space-y-4">
                                            <h2 className="text-5xl font-extrabold text-slate-900 dark:text-white tracking-tighter mb-4 italic uppercase leading-none">{activeCompany.nombre}</h2>
                                            <div className="flex flex-wrap gap-3">
                                                <span className="px-4 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 border dark:border-slate-700"><Icon name="hash" size={12}/>{activeCompany.cuit}</span>
                                                <span className="px-4 py-1.5 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 rounded-full text-[10px] font-bold uppercase tracking-widest italic flex items-center gap-2 border border-indigo-100 dark:border-indigo-900/30"><Icon name="user" size={12}/>{activeCompany.responsable}</span>
                                            </div>
                                        </div>
                                        <button onClick={() => setModalType('vehicle')} className="btn-modern px-8 py-4 rounded-2xl flex items-center gap-2 shadow-xl italic text-sm leading-none">
                                            <Icon name="plus"/> Agregar Equipo
                                        </button>
                                    </div>

                                    <div className="grid gap-8">
                                        {(activeCompany.vehiculos || []).map(v => {
                                            const interval = v.serviceInterval || SERVICE_INTERVAL_DEFAULT;
                                            const hsCiclo = (v.horometroTotal || 0) - (v.ultimoServiceHoras || 0);
                                            const perc = Math.max(0, 100 - (hsCiclo / interval * 100));
                                            const isExpanded = expandedVehicles.has(v.id);
                                            
                                            return (
                                                <div key={v.id} className="glass-card p-8 flex flex-col gap-8 relative overflow-hidden group">
                                                    <div className={`absolute top-0 right-0 px-6 py-2 text-[10px] font-bold uppercase tracking-widest italic ${v.operativo ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                                                        {v.operativo ? '● Operativo' : '● Fuera de Servicio'}
                                                    </div>

                                                    <div className="flex flex-col xl:flex-row gap-10">
                                                        <div className="flex-1 space-y-6">
                                                            <div className="flex items-center gap-6">
                                                                <div className="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-3xl flex items-center justify-center text-slate-400 group-hover:text-indigo-600 transition-all">
                                                                    <Icon name="truck" size={32}/>
                                                                </div>
                                                                <div>
                                                                    <h4 className="text-2xl font-extrabold text-slate-800 dark:text-white italic tracking-tight uppercase leading-none mb-1">{v.nombre}</h4>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="mono text-indigo-600 font-bold bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-lg text-sm">{v.horometroTotal.toLocaleString()} HS</span>
                                                                        <button onClick={() => downloadVehiclePDF(activeCompany, v)} className="text-slate-300 hover:text-indigo-600 transition-colors" title="Descargar Ficha Técnica"><Icon name="download" size={18}/></button>
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            <div className="space-y-3">
                                                                <div className="flex justify-between items-end">
                                                                    <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest italic leading-none">Vida Útil Aceite ({interval}HS)</span>
                                                                    <span className={`text-xl font-extrabold ${perc < 20 ? 'text-rose-600' : 'text-slate-800 dark:text-white'}`}>{perc.toFixed(0)}%</span>
                                                                </div>
                                                                <div className="h-2.5 w-full bg-slate-100 dark:bg-slate-950 rounded-full overflow-hidden shadow-inner border dark:border-slate-800">
                                                                    <div className={`h-full transition-all duration-1000 ${perc < 20 ? 'bg-rose-600' : 'bg-indigo-600'}`} style={{width: `${perc}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="flex flex-row xl:flex-col gap-3 w-full xl:w-64 justify-center">
                                                            <button onClick={() => { setActiveVehicleId(v.id); setModalType('log'); }} className="flex-1 p-3 bg-slate-50 dark:bg-slate-800 hover:bg-white dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-[11px] uppercase tracking-widest italic transition-all leading-none">Registrar Uso</button>
                                                            <button onClick={() => handleToggleStatus(v.id, v.operativo)} className={`flex-1 p-3 rounded-xl font-bold text-[11px] uppercase tracking-widest border transition-all italic leading-none ${v.operativo ? 'bg-white dark:bg-slate-950 border-rose-200 text-rose-500 hover:bg-rose-50' : 'bg-emerald-500 text-white shadow-md shadow-emerald-500/10'}`}>
                                                                {v.operativo ? 'Informar Avería' : 'Reactivar'}
                                                            </button>
                                                            <button onClick={() => { setActiveVehicleId(v.id); setModalType('service'); }} className="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-bold text-[11px] uppercase tracking-widest shadow-lg italic leading-none">Realizar Service</button>
                                                        </div>
                                                    </div>

                                                    {/* SECCIÓN DE HISTORIAL INTEGRADA - ACTUALIZACIÓN AUTOMÁTICA */}
                                                    <div className="pt-4 border-t dark:border-slate-800">
                                                        <button 
                                                            onClick={() => toggleHistory(v.id)}
                                                            className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition-colors"
                                                        >
                                                            <Icon name="history" size={14}/> 
                                                            {isExpanded ? 'Ocultar Detalle Técnico' : 'Ver Detalle de Registros'}
                                                            <Icon name="chevronDown" size={14} className={`transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`}/>
                                                        </button>

                                                        {isExpanded && (
                                                            <div className="mt-6 animate-in slide-in-from-top-4 duration-300">
                                                                <div className="overflow-hidden rounded-2xl border dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/30 shadow-inner">
                                                                    <table className="w-full history-table text-[11px]">
                                                                        <thead className="bg-slate-100 dark:bg-slate-800/50">
                                                                            <tr>
                                                                                <th>Fecha</th>
                                                                                <th>Evento</th>
                                                                                <th>Lectura</th>
                                                                                <th>Detalle Técnico / Consumo</th>
                                                                            </tr>
                                                                        </thead>
                                                                        <tbody>
                                                                            {[...(v.eventos || [])].reverse().map((ev, idx) => (
                                                                                <tr key={idx} className="hover:bg-white dark:hover:bg-slate-800/40 transition-all">
                                                                                    <td className="font-bold opacity-60 italic">{ev.fecha}</td>
                                                                                    <td>
                                                                                        <span className={`px-2 py-0.5 rounded-md font-bold text-[9px] uppercase tracking-tighter shadow-sm border ${
                                                                                            ev.tipo === 'SERVICE' ? 'bg-indigo-100 text-indigo-700 border-indigo-200' :
                                                                                            ev.tipo === 'BAJA' ? 'bg-rose-100 text-rose-700 border-rose-200' :
                                                                                            ev.tipo === 'ALTA' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' :
                                                                                            'bg-slate-200 text-slate-600 border-slate-300'
                                                                                        }`}>
                                                                                            {ev.tipo}
                                                                                        </span>
                                                                                    </td>
                                                                                    <td className="mono font-bold text-indigo-600">{(ev.horas || v.horometroTotal).toLocaleString()} HS</td>
                                                                                    <td className="text-slate-500 font-semibold italic max-w-[280px] break-words">
                                                                                        {ev.litros ? <span className="text-amber-600 font-black flex items-center gap-1 mb-1"><Icon name="fuel" size={10}/> Carga: {ev.litros} Lts. </span> : ''}
                                                                                        {ev.nota || ev.motivo || (ev.insumos ? `Repuestos: ${ev.insumos.join(', ')}` : '-')}
                                                                                    </td>
                                                                                </tr>
                                                                            ))}
                                                                            {(!v.eventos || v.eventos.length === 0) && (
                                                                                <tr><td colSpan="4" className="text-center py-10 opacity-40 font-bold italic uppercase text-[10px] tracking-widest italic">No se registran datos técnicos históricos</td></tr>
                                                                            )}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* --- MODALES DINÁMICOS --- */}

                        {modalType === 'company' && (
                            <Modal title="Apertura de Cuenta" onClose={() => setModalType(null)}>
                                <div className="space-y-5">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic">Razón Social</label>
                                        <input className="w-full input-modern font-bold text-lg" placeholder="Ej: Transportes Alfa S.A." value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic tracking-widest">C.U.I.T.</label>
                                            <input className="w-full input-modern" placeholder="30-..." value={form.cuit} onChange={e => setForm({...form, cuit: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic">Encargado Operativo</label>
                                            <input className="w-full input-modern" placeholder="Nombre completo" value={form.responsable} onChange={e => setForm({...form, responsable: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleAddCompany} className="btn-modern w-full p-5 rounded-3xl mt-4 italic shadow-2xl uppercase text-xs tracking-widest">Confirmar Registro</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'vehicle' && (
                            <Modal title="Ficha Técnica de Equipo" onClose={() => setModalType(null)}>
                                <div className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-indigo-600 uppercase ml-2 tracking-[0.2em] italic">Identificación (Marca / Modelo / Interno)</label>
                                        <input className="w-full input-modern font-bold text-xl uppercase italic text-indigo-600" placeholder="Ej: CAT 320 GC - INT 05" value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-indigo-600 uppercase ml-2 tracking-widest italic leading-none">Ciclo de Mantenimiento (HS)</label>
                                            <input className="w-full input-modern" type="number" value={form.serviceInterval} onChange={e => setForm({...form, serviceInterval: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Horómetro de Entrada</label>
                                            <input className="w-full input-modern mono text-xl" type="number" placeholder="0.0" value={form.horometro} onChange={e => setForm({...form, horometro: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Marca</label>
                                            <input className="w-full input-modern" placeholder="Ej: Caterpillar" value={form.marca} onChange={e => setForm({...form, marca: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Modelo</label>
                                            <input className="w-full input-modern" placeholder="Ej: 320D" value={form.modelo} onChange={e => setForm({...form, modelo: e.target.value})} />
                                        </div>
                                        <div className="sm:col-span-2 space-y-1">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Número de Serie / Chasis</label>
                                            <input className="w-full input-modern" placeholder="VIN / SN" value={form.serie} onChange={e => setForm({...form, serie: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleAddVehicle} className="btn-modern w-full p-5 rounded-3xl mt-4 italic shadow-xl uppercase text-sm tracking-widest leading-none">Vincular a Flota Operativa</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'log' && (
                            <Modal title="Registrar Uso y Consumo" onClose={() => setModalType(null)}>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-indigo-500 uppercase ml-2 italic tracking-widest leading-none">Horómetro Actual</label>
                                            <input className="w-full p-6 rounded-2xl input-modern mono text-4xl text-center text-indigo-600" type="number" autoFocus placeholder="0.0" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold text-amber-500 uppercase ml-2 italic tracking-widest leading-none">Combustible Cargado (Lts)</label>
                                            <div className="relative">
                                                <Icon name="fuel" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"/>
                                                <input className="w-full p-6 pl-12 rounded-2xl input-modern mono text-4xl text-center text-amber-600" type="number" placeholder="0" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Observaciones del Operador</label>
                                        <textarea className="w-full input-modern min-h-[120px] italic text-sm font-semibold" placeholder="Reportar novedades mecánicas o del turno..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    </div>
                                    <button onClick={handleDailyLog} className="btn-modern w-full p-6 rounded-3xl shadow-xl italic tracking-widest leading-none uppercase text-xs">Guardar Registro Diario</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'service' && (
                            <Modal title="Reporte Técnico de Service" onClose={() => setModalType(null)}>
                                <div className="space-y-6">
                                    <div className="p-6 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 rounded-3xl text-center shadow-inner">
                                        <p className="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-2 italic leading-none">Punto de Control para Reinicio de Ciclo</p>
                                        <p className="mono text-3xl font-black text-emerald-700 dark:text-emerald-300 italic leading-none">
                                            HS {activeCompany?.vehiculos?.find(v => v.id === activeVehicleId)?.horometroTotal?.toLocaleString() || '0'}
                                        </p>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-2 italic leading-none">Selección de Repuestos / Insumos</label>
                                        <div className="flex flex-wrap gap-2">
                                            {['Filtro Aceite', 'Filtro Aire', 'Filtro Combustible', 'Aceite 15W40', 'Grasa Litio', 'Líquido Ref.', 'Hidráulico 68'].map(item => (
                                                <button key={item} onClick={() => setForm(prev => ({ ...prev, insumos: prev.insumos.includes(item) ? prev.insumos.filter(i => i !== item) : [...prev.insumos, item] }))} 
                                                    className={`px-3 py-2 rounded-xl border-2 font-bold text-[10px] transition-all italic uppercase tracking-tighter ${form.insumos.includes(item) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-500'}`}>
                                                    {item}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="flex gap-2 p-2 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 focus-within:border-indigo-600 transition-all">
                                            <input className="flex-1 bg-transparent px-4 py-2 text-xs font-bold focus:outline-none" placeholder="Agregar otro insumo..." value={form.insumoManual} onChange={e => setForm({...form, insumoManual: e.target.value})} />
                                            <button onClick={() => { if(form.insumoManual) setForm(prev => ({ ...prev, insumos: [...prev.insumos, form.insumoManual.toUpperCase()], insumoManual: '' })); }} className="w-10 h-10 bg-indigo-600 text-white rounded-xl font-black flex items-center justify-center shadow-lg active:scale-95 transition-all"><Icon name="plus" size={18}/></button>
                                        </div>

                                        <div className="flex flex-wrap gap-2">
                                            {form.insumos.map((ins, idx) => (
                                                !['Filtro Aceite', 'Filtro Aire', 'Filtro Combustible', 'Aceite 15W40', 'Grasa Litio', 'Líquido Ref.', 'Hidráulico 68'].includes(ins) && (
                                                    <span key={idx} className="flex items-center gap-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 px-3 py-1.5 rounded-lg text-[10px] font-black italic uppercase shadow-sm border border-indigo-100">
                                                        {ins}
                                                        <button onClick={() => setForm(prev => ({ ...prev, insumos: prev.insumos.filter(i => i !== ins) }))} className="hover:text-rose-600 transition-colors"><Icon name="x" size={12}/></button>
                                                    </span>
                                                )
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none">Notas Adicionales / Firma Mecánico</label>
                                        <textarea className="w-full input-modern min-h-[120px] italic font-semibold text-sm" placeholder="Especificar marcas, fallas detectadas o tareas realizadas..." value={form.note} onChange={e => setForm({...form, nota: e.target.value})} />
                                    </div>
                                    <button onClick={handleServiceReset} className="btn-modern w-full p-6 rounded-3xl italic shadow-2xl tracking-widest leading-none uppercase text-xs">Certificar y Reiniciar Ciclo</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'downtime' && (
                            <Modal title="Certificado de Parada Técnica" onClose={() => setModalType(null)}>
                                <div className="space-y-5">
                                    <div className="p-4 bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-900/50 rounded-2xl flex items-center gap-3">
                                        <Icon name="alert" size={24} className="text-rose-600 animate-pulse"/>
                                        <p className="text-[10px] font-bold text-rose-600 uppercase tracking-widest leading-tight">El equipo cambiará a estado NO OPERATIVO de forma inmediata</p>
                                    </div>
                                    <textarea className="w-full input-modern min-h-[150px] italic font-semibold" placeholder="Describa el motivo detallado de la avería..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                    <button onClick={handleConfirmDowntime} className="w-full p-6 bg-rose-600 hover:bg-rose-700 rounded-3xl font-bold text-white shadow-xl transition-all uppercase text-[10px] tracking-widest italic leading-none">Emitir Orden de Parada</button>
                                </div>
                            </Modal>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
