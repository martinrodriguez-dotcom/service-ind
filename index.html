<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServicePro EAM | Gestión Industrial</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_RnRMxTrKDcNtyLfPRxHxVpqnKhTFemQ",
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        .guantes-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 2.5rem; transition: all 0.3s ease; }
        .guantes-card:hover { border-color: #ea580c; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LayoutDashboard, Building2, Plus, AlertTriangle, Truck, 
            CheckCircle2, Wrench, Activity, ChevronLeft, Clock, Hash,
            X, Save, User, AlertCircle, DollarSign
        } = lucide;

        // --- COMPONENTES INTERNOS ---
        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md" onClick={onClose} />
                <div className="relative w-full max-w-xl bg-slate-900 border-2 border-slate-800 rounded-[3rem] overflow-hidden shadow-2xl">
                    <div className="p-8 border-b border-slate-800 flex justify-between items-center">
                        <h3 className="text-2xl font-black uppercase italic tracking-tighter">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-full"><X/></button>
                    </div>
                    <div className="p-10">{children}</div>
                </div>
            </div>
        );

        // --- APLICACIÓN PRINCIPAL ---
        const App = () => {
            const [companies, setCompanies] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [showCompanyForm, setShowCompanyForm] = useState(false);
            const [showVehicleForm, setShowVehicleForm] = useState(false);
            const [newComp, setNewComp] = useState({ nombre: '', cuit: '' });
            const [newVeh, setNewVeh] = useState({ nombre: '', horometroInicial: '' });

            // Cargar datos
            useEffect(() => {
                const q = window.fb.query(window.fb.collection(window.db, "companies"));
                const unsubscribe = window.fb.onSnapshot(q, (snapshot) => {
                    setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, []);

            // Lógica de Alertas
            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(c => {
                    (c.vehiculos || []).forEach(v => {
                        const rest = 250 - (v.horometroTotal - v.ultimoServiceHoras);
                        if (rest < 50) list.push({ ...v, emp: c.nombre, rest });
                    });
                });
                return list.sort((a, b) => a.rest - b.rest);
            }, [companies]);

            // Acciones Firebase
            const saveCompany = async () => {
                await window.fb.addDoc(window.fb.collection(window.db, "companies"), { ...newComp, vehiculos: [] });
                setShowCompanyForm(false);
                setNewComp({ nombre: '', cuit: '' });
            };

            const saveVehicle = async () => {
                const ref = window.fb.doc(window.db, "companies", selectedCompany.id);
                const v = { 
                    id: Date.now(), nombre: newVeh.nombre, 
                    horometroTotal: parseFloat(newVeh.horometroInicial), 
                    ultimoServiceHoras: parseFloat(newVeh.horometroInicial), 
                    operativo: true, eventos: [] 
                };
                await window.fb.updateDoc(ref, { vehiculos: window.fb.arrayUnion(v) });
                setShowVehicleForm(false);
                setNewVeh({ nombre: '', horometroInicial: '' });
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 border-r border-slate-900 bg-slate-950 p-8 flex flex-col gap-10">
                        <div className="flex items-center gap-4 text-orange-600">
                            <Wrench size={32} strokeWidth={3} />
                            <h1 className="text-2xl font-black uppercase tracking-tighter text-white">ServicePro</h1>
                        </div>
                        <nav className="flex flex-col gap-3">
                            <button onClick={() => {setActiveTab('dashboard'); setSelectedCompany(null);}} 
                                className={`p-4 rounded-2xl flex items-center gap-4 font-black text-sm uppercase tracking-widest transition-all ${activeTab === 'dashboard' ? 'bg-orange-600 shadow-lg shadow-orange-900/40' : 'text-slate-500 hover:text-white'}`}>
                                <LayoutDashboard size={20}/> Dashboard
                            </button>
                            <button onClick={() => {setActiveTab('companies'); setSelectedCompany(null);}} 
                                className={`p-4 rounded-2xl flex items-center gap-4 font-black text-sm uppercase tracking-widest transition-all ${activeTab === 'companies' ? 'bg-orange-600 shadow-lg shadow-orange-900/40' : 'text-slate-500 hover:text-white'}`}>
                                <Building2 size={20}/> Empresas
                            </button>
                        </nav>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-12 overflow-y-auto bg-[#020617]">
                        {activeTab === 'dashboard' && (
                            <div className="max-w-4xl mx-auto space-y-12">
                                <h2 className="text-6xl font-black tracking-tighter">Alertas Críticas</h2>
                                <div className="grid gap-6">
                                    {alerts.map((a, i) => (
                                        <div key={i} className="guantes-card p-8 flex justify-between items-center border-l-[12px] border-l-orange-600">
                                            <div>
                                                <p className="text-3xl font-black">{a.nombre}</p>
                                                <p className="text-slate-500 font-bold uppercase text-xs tracking-widest">{a.emp}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-4xl font-black text-orange-500">{a.rest.toFixed(0)} HS</p>
                                                <p className="text-[10px] font-black opacity-30 uppercase">Faltantes</p>
                                            </div>
                                        </div>
                                    ))}
                                    {alerts.length === 0 && <div className="p-20 text-center border-4 border-dashed border-slate-900 rounded-[3rem] text-slate-700 font-black uppercase tracking-widest">Sin alertas pendientes</div>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'companies' && !selectedCompany && (
                            <div className="max-w-5xl mx-auto space-y-12">
                                <div className="flex justify-between items-end border-b-2 border-slate-900 pb-10">
                                    <h2 className="text-6xl font-black tracking-tighter">Directorio</h2>
                                    <button onClick={() => setShowCompanyForm(true)} className="bg-orange-600 px-8 py-4 rounded-2xl font-black flex items-center gap-3 hover:scale-105 transition-transform"><Plus/> ALTA</button>
                                </div>
                                <div className="grid grid-cols-2 gap-8">
                                    {companies.map(emp => (
                                        <button key={emp.id} onClick={() => setSelectedCompany(emp)} className="guantes-card p-10 text-left group">
                                            <div className="mb-6 bg-slate-950 w-16 h-16 rounded-2xl flex items-center justify-center text-slate-600 group-hover:text-orange-500 transition-colors"><Building2 size={32}/></div>
                                            <h3 className="text-4xl font-black tracking-tighter mb-2">{emp.nombre}</h3>
                                            <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">Equipos: {emp.vehiculos?.length || 0}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {selectedCompany && (
                            <div className="max-w-5xl mx-auto space-y-12 animate-in slide-in-from-right">
                                <button onClick={() => setSelectedCompany(null)} className="text-slate-500 font-black flex items-center gap-2 uppercase text-xs tracking-widest hover:text-orange-500"><ChevronLeft/> Volver</button>
                                <div className="flex justify-between items-end">
                                    <h2 className="text-7xl font-black tracking-tighter leading-none">{selectedCompany.nombre}</h2>
                                    <button onClick={() => setShowVehicleForm(true)} className="bg-orange-600 px-8 py-4 rounded-2xl font-black flex items-center gap-3 tracking-widest uppercase text-xs">Vincular Equipo</button>
                                </div>
                                <div className="grid gap-6">
                                    {(selectedCompany.vehiculos || []).map(v => (
                                        <div key={v.id} className="guantes-card p-8 flex justify-between items-center">
                                            <div className="flex items-center gap-6 text-slate-300">
                                                <div className="p-4 bg-slate-950 rounded-2xl"><Truck size={32}/></div>
                                                <div>
                                                    <p className="text-3xl font-black">{v.nombre}</p>
                                                    <p className="text-orange-500 font-black tracking-widest text-xs uppercase italic">{v.horometroTotal} Horas Totales</p>
                                                </div>
                                            </div>
                                            <div className="px-6 py-3 rounded-full bg-slate-950 border border-slate-800 text-[10px] font-black uppercase tracking-widest">
                                                {v.operativo ? '● Operativo' : '○ Parado'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALES */}
                    {showCompanyForm && (
                        <Modal title="Nueva Empresa" onClose={() => setShowCompanyForm(false)}>
                            <div className="space-y-6">
                                <input className="w-full p-5 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-orange-600 font-bold" 
                                    placeholder="Razón Social" onChange={e => setNewComp({...newComp, nombre: e.target.value})} />
                                <input className="w-full p-5 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-orange-600 font-bold" 
                                    placeholder="CUIT" onChange={e => setNewComp({...newComp, cuit: e.target.value})} />
                                <button onClick={saveCompany} className="w-full p-6 bg-orange-600 rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-orange-900/40">Guardar Empresa</button>
                            </div>
                        </Modal>
                    )}

                    {showVehicleForm && (
                        <Modal title="Nuevo Equipo" onClose={() => setShowVehicleForm(false)}>
                            <div className="space-y-6">
                                <input className="w-full p-5 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-orange-600 font-bold" 
                                    placeholder="Identificación (Ej: CAT 320)" onChange={e => setNewVeh({...newVeh, nombre: e.target.value})} />
                                <input className="w-full p-5 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-orange-600 font-bold" type="number"
                                    placeholder="Horómetro Actual" onChange={e => setNewVeh({...newVeh, horometroInicial: e.target.value})} />
                                <button onClick={saveVehicle} className="w-full p-6 bg-orange-600 rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-orange-900/40">Vincular</button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
