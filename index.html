<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BND Equipos | Gestión EAM & Combustible Pro</title>
    
    <!-- LIBRERÍAS CORE -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS ESPECIALIZADAS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #f59e0b;
            --bg-app: #f8fafc;
            --card-border: #e2e8f0;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app); 
            color: #0f172a; 
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .btn-modern {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            transition: all 0.2s;
        }

        .btn-modern:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
        .btn-modern:active:not(:disabled) { transform: scale(0.98); }
        .btn-modern:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        .input-modern {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .input-modern:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.05);
        }

        .fuel-tank-capsule {
            width: 140px;
            height: 70px;
            position: relative;
        }

        .history-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            background: #f1f5f9;
        }
        .history-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }

        @media (max-width: 1024px) {
            .sidebar-mobile {
                position: fixed;
                left: 0; top: 0; height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar-mobile.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- FIREBASE INITIALIZATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_RnRMxTrKDcNtyLfPRxHxVpqnKhTFemQ",
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            window.db = db;
            window.auth = auth;
            window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
            window.appId = "bnd-service-v12-production"; 
            
            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);

                    console.warn("Auth Fallback", e);

                window.dispatchEvent(new Event('firebase-ready'));
            };
            initAuth();
            
        } catch (error) {
            console.error("Error crítico de Firebase:", error);
        }
    </script>

    <!-- REACT APPLICATION -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SERVICE_INTERVAL_DEFAULT = 250;

        // --- COMPONENTE MODAL ---
        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 animate-fade-in">
                <div className="absolute inset-0 bg-slate-950/20 backdrop-blur-sm" onClick={onClose} />
                <div className="relative w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                    <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white">
                        <h3 className="text-xl font-extrabold text-slate-800 tracking-tight uppercase italic leading-none">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full transition-all text-slate-400 leading-none"><Icon name="x" size={24} /></button>
                    </div>
                    <div className="p-8 max-h-[85vh] overflow-y-auto leading-none">{children}</div>
                </div>
            </div>
        );

        // --- COMPONENTE TANQUE VISUAL ---
        const FuelTankCapsule = ({ capacity, current, label = "Combustible" }) => {
            const perc = capacity > 0 ? Math.max(0, Math.min(100, (current / capacity) * 100)) : 0;
            let color = "#10b981"; // Verde (> 50%)
            if (perc <= 50) color = "#f59e0b"; // Amarillo (50-25%)
            if (perc <= 25) color = "#ef4444"; // Rojo (< 25%)

            return (
                <div className="flex flex-col items-center gap-2">
                    <div className="fuel-tank-capsule">
                        <svg viewBox="0 0 140 80" className="w-full h-full drop-shadow-sm">
                            <rect x="10" y="10" width="120" height="60" rx="30" fill="#f1f5f9" stroke="#e2e8f0" strokeWidth="2" />
                            <clipPath id="tankClipCapsule">
                                <rect x="10" y={70 - (perc * 0.6)} width="120" height={perc * 0.6} rx="2" />
                            </clipPath>
                            <rect x="10" y="10" width="120" height="60" rx="30" fill={color} clipPath="url(#tankClipCapsule)" opacity="0.8" />
                            <text x="70" y="45" textAnchor="middle" className="font-extrabold text-[12px] mono" fill={perc < 40 ? "#64748b" : "white"}>{perc.toFixed(0)}%</text>
                        </svg>
                    </div>
                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-tighter italic">Lts: {Math.floor(current).toLocaleString()}</span>
                </div>
            );
        };

        // --- SISTEMA DE ICONOS SVG ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 11h7v10H3V11z" strokeWidth="2"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" strokeWidth="2.5"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" strokeWidth="2"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2" strokeWidth="2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z" strokeWidth="2"/>,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeWidth="2"/>,
                chevronLeft: <path d="M15 18l-6-6 6-6" strokeWidth="2.5"/>,
                x: <path d="M18 6L6 18M6 6l12 12" strokeWidth="2.5"/>,
                check: <path d="M20 6L9 17l-5-5" strokeWidth="2.5"/>,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 000.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" strokeWidth="2"/></React.Fragment>,
                fuel: <React.Fragment><path d="M3 22V8c0-2.1 1.7-3.8 3.8-3.8h7.5c2.1 0 3.8 1.7 3.8 3.8v14M4 9h13"/><path d="M19 8h1a2 2 0 012 2v6a2 2 0 01-2 2h-1M19 18h2"/><circle cx="10" cy="13" r="3"/></React.Fragment>,
                calendar: <React.Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" strokeWidth="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></React.Fragment>,
                history: <React.Fragment><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 11.5 4m-.5 5v-5h5"/></React.Fragment>,
                hash: <path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18" strokeWidth="2"/>,
                menu: <path d="M3 12h18M3 6h18M3 18h18" strokeWidth="2.5" />,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                chart: <path d="M18 20V10M12 20V4M6 20v-6" strokeWidth="2" />,
                search: <React.Fragment><circle cx="11" cy="11" r="8" strokeWidth="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" strokeWidth="2"/></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompanyId, setSelectedCompanyId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [expandedVehicles, setExpandedVehicles] = useState(new Set());
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            const [scannerActive, setScannerActive] = useState(false);
            const scannerRef = useRef(null);
            const chartRef = useRef(null);

            const [bndSettings, setBndSettings] = useState({
                name: "BND EQUIPOS S.A.",
                description: "Mantenimiento Industrial & Gestión de Activos Críticos",
                address: "Zona Industrial, Nave 12",
                phone: "+54 9 11 5555-0101",
                email: "tecnica@bndequipos.com",
                web: "www.bndequipos.com"
            });

            const [form, setForm] = useState({ 
                nombre: '', cuit: '', responsable: '', mail: '', tel: '',
                marca: '', modelo: '', serie: '', patente: '', año: '', serviceInterval: 250, 
                horometro: '', horas: '', litros: '', nota: '', motivo: '', tankCapacity: 1000,
                insumos: [], insumoManual: '', fecha: new Date().toISOString().split('T')[0],
                tipoHistorial: 'REGISTRO', filterStartDate: '', filterEndDate: ''
            });

            // --- SINCRONIZACIÓN FIREBASE ---
            useEffect(() => {
                const initSync = () => {
                    if (!window.fb || !window.auth) return;
                    window.fb.onAuthStateChanged(window.auth, (u) => {
                        setUser(u);
                        if (u) {
                            const configRef = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info");
                            window.fb.getDoc(configRef).then(snap => { if(snap.exists()) setBndSettings(snap.data()); });

                            const q = window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies");
                            const unsub = window.fb.onSnapshot(q, (snapshot) => {
                                setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                setLoading(false);
                            });
                            return () => unsub();
                        } else { setLoading(false); }
                    });
                };
                if (window.db) initSync();
                else window.addEventListener('firebase-ready', initSync);
            }, []);

            // --- ALERTAS CRÍTICAS ---
            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    const fuelPerc = ((emp.currentFuel || 0) / (emp.tankCapacity || 1000)) * 100;
                    if (fuelPerc <= 25) {
                        list.push({ type: 'FUEL_CRITICAL', companyName: emp.nombre, companyId: emp.id, value: fuelPerc.toFixed(1) });
                    }
                    (emp.vehiculos || []).forEach(veh => {
                        if (!veh.operativo) {
                            list.push({ type: 'BREAKDOWN', ...veh, companyId: emp.id, companyName: emp.nombre });
                        }
                        const rest = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        if (rest < 50 && veh.operativo) {
                            list.push({ type: 'MAINTENANCE', ...veh, companyId: emp.id, companyName: emp.nombre, rest });
                        }
                    });
                });
                return list.sort((a,b) => (a.type === 'BREAKDOWN' ? -1 : 1));
            }, [companies]);

            const projections = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const regs = (veh.eventos || []).filter(e => e.tipo === 'REGISTRO').sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
                        let avg = 0;
                        if (regs.length >= 2) {
                            const first = regs[0]; const last = regs[regs.length - 1];
                            const diffHs = (parseFloat(last.horas) || 0) - (parseFloat(first.horas) || 0);
                            const diffDays = Math.max(1, (new Date(last.fecha) - new Date(first.fecha)) / 86400000);
                            avg = diffHs / diffDays;
                        }
                        const rest = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        let date = null;
                        if (avg > 0 && rest > 0) {
                            date = new Date(); date.setDate(date.getDate() + Math.ceil(rest / avg));
                        }
                        list.push({ ...veh, empresaNombre: emp.nombre, companyId: emp.id, estDate: date, avgUsage: avg, restHs: rest });
                    });
                });
                return list.sort((a,b) => (a.estDate || Infinity) - (b.estDate || Infinity));
            }, [companies]);

            const activeCompany = useMemo(() => companies.find(c => c.id === selectedCompanyId), [companies, selectedCompanyId]);

            // --- GRÁFICO (CHART.JS) ---
            useEffect(() => {
                if (modalType === 'details' && activeCompany && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    let allEvents = activeCompany.vehiculos.flatMap(v => (v.eventos || []).filter(e => e.litros > 0));
                    if (form.filterStartDate) allEvents = allEvents.filter(e => e.fecha >= form.filterStartDate);
                    if (form.filterEndDate) allEvents = allEvents.filter(e => e.fecha <= form.filterEndDate);

                    const monthLabels = Array.from({length: 6}, (_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() - (5 - i));
                        return d.toISOString().substring(0, 7);
                    });
                    const dataPoints = monthLabels.map(m => allEvents.filter(e => e.fecha.startsWith(m)).reduce((sum, e) => sum + parseFloat(e.litros || 0), 0));

                    if (window.myChart) window.myChart.destroy();
                    window.myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: monthLabels.map(m => {
                                const names = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
                                return names[parseInt(m.split('-')[1])-1];
                            }),
                            datasets: [{ label: 'Consumo (Lts)', data: dataPoints, borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)', fill: true, tension: 0.4, borderWidth: 3 }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }
            }, [modalType, activeCompany, form.filterStartDate, form.filterEndDate]);

            // --- PDF ---
            const downloadPDF = (company, vehicle) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const interval = parseFloat(vehicle.serviceInterval) || 250;
                const hsCons = (parseFloat(vehicle.horometroTotal) || 0) - (parseFloat(vehicle.ultimoServiceHoras) || 0);
                const prog = Math.max(0, 100 - (hsCons / interval * 100));

                doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(26); doc.setFont("helvetica", "bold");
                doc.text(bndSettings.name.toUpperCase(), 15, 22);
                doc.setFontSize(9); doc.text(bndSettings.description, 15, 30);
                doc.setFontSize(8); doc.text(`Tel: ${bndSettings.phone} | Email: ${bndSettings.email}`, 140, 28);
                doc.setFillColor(234, 88, 12); doc.rect(0, 45, 210, 2, 'F');

                doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.text("EXPEDIENTE TÉCNICO DE UNIDAD", 15, 60);
                doc.setFillColor(248, 250, 252); doc.rect(15, 65, 180, 25, 'F');
                doc.setFontSize(10); doc.setTextColor(71, 85, 105);
                doc.text(`CLIENTE: ${company.nombre.toUpperCase()}`, 20, 73);
                doc.text(`EQUIPO: ${vehicle.nombre} | PATENTE: ${vehicle.patente || '-'}`, 20, 80);
                doc.text(`HORAS: ${vehicle.horometroTotal} HS`, 110, 73);
                doc.text(`VIDA ACEITE: ${prog.toFixed(1)}%`, 110, 80);

                const tableData = (vehicle.eventos || []).slice().reverse().map(ev => [ev.fecha, ev.tipo, `${ev.horas || '-'} HS`, ev.litros || '-', ev.nota || ev.motivo || '-']);
                doc.autoTable({ startY: 95, head: [['FECHA', 'EVENTO', 'LECTURA', 'CARGA', 'DETALLE']], body: tableData, headStyles: { fillColor: [79, 70, 229] }, styles: { fontSize: 8 } });
                doc.save(`Ficha_${vehicle.nombre.replace(/\s+/g, '_')}.pdf`);
            };

            // --- ACCIONES ---
            const saveBndSettings = async () => {
                if(!user) return;
                await window.fb.setDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info"), bndSettings);
                setActiveTab('dashboard');
            };

            const handleDailyLog = async () => {
                if (!user || !activeCompany || !form.horas || !form.litros) return;
                const h = parseFloat(form.horas); const l = parseFloat(form.litros);
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, horometroTotal: h, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'REGISTRO', fecha: form.fecha, horas: h, litros: l, nota: form.nota }] } : v);
                const newFuel = Math.max(0, (activeCompany.currentFuel || 0) - l);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated, currentFuel: newFuel });
                setModalType(null); setForm({ ...form, horas: '', litros: '', nota: '' });
            };

            const handleAddCompany = async () => {
                if (!user) return;
                await window.fb.addDoc(window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies"), { 
                    nombre: form.nombre, cuit: form.cuit, responsable: form.responsable, 
                    tankCapacity: parseFloat(form.tankCapacity) || 1000, currentFuel: parseFloat(form.tankCapacity) || 1000, vehiculos: [] 
                });
                setModalType(null);
            };

            const handleAddVehicle = async () => {
                if (!user || !activeCompany) return;
                const ref = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id);
                const h = parseFloat(form.horometro) || 0;
                const v = { id: Date.now().toString(), ...form, horometroTotal: h, ultimoServiceHoras: h, operativo: true, eventos: [{ id: Date.now(), tipo: 'ALTA', fecha: new Date().toLocaleDateString(), horas: h, nota: 'Alta inicial' }] };
                await window.fb.updateDoc(ref, { vehiculos: window.fb.arrayUnion(v) });

                                                </div>
                                                <div className="text-right shrink-0 leading-none leading-none leading-none leading-none leading-none">
                                                    <p className="text-[9px] font-black text-indigo-600 uppercase tracking-widest mb-1 italic leading-none leading-none leading-none">Service Est.</p>
                                                    <p className="text-xl font-black text-slate-800 italic leading-none leading-none leading-none leading-none">{p.estDate ? p.estDate.toLocaleDateString() : '---'}</p>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest italic leading-tight leading-none leading-none">
                                                <div>Promedio Diario: <span className="text-indigo-600 text-xs block font-black mt-1 leading-none leading-none">{p.avgUsage.toFixed(1)} HS</span></div>
                                                <div className="text-right">Faltante Ciclo: <span className="text-indigo-600 text-xs block font-black mt-1 leading-none leading-none">{Math.max(0, p.restHs).toFixed(1)} HS</span></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* --- MODALES DINÁMICOS --- */}
                    {modalType && (
                        <Modal title={
                            modalType === 'company' ? "Alta de Empresa" : 
                            modalType === 'vehicle' ? "Vincular Equipo" : 
                            modalType === 'log' ? "Registrar Uso" : 
                            modalType === 'details' ? "Analítica de Empresa" : 
                            modalType === 'historical' ? "Carga Histórica" :
                            modalType === 'downtime' ? "Informar Avería" : "Módulo BND"
                        } onClose={() => setModalType(null)}>
                            
                            {modalType === 'company' && (
                                <div className="space-y-5 leading-none leading-none">
                                    <input className="w-full input-modern font-bold text-lg leading-none shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Razón Social" onChange={e => setForm({...form, nombre: e.target.value})} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none leading-none leading-none"><input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="C.U.I.T." onChange={e => setForm({...form, cuit: e.target.value})} /><input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Responsable" onChange={e => setForm({...form, responsable: e.target.value})} /></div>
                                    <div className="space-y-2 leading-none leading-none leading-none leading-none"><label className="text-[10px] font-black text-slate-400 uppercase ml-2 italic tracking-widest leading-none leading-none">Capacidad Tanque (Lts)</label><input type="number" className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Ej: 1000" onChange={e => setForm({...form, tankCapacity: e.target.value})} /></div>
                                    <button onClick={handleAddCompany} className="btn-modern w-full p-5 rounded-3xl mt-4 italic uppercase text-xs tracking-widest leading-none shadow-xl leading-none shadow-sm leading-none leading-none leading-none">Confirmar Alta</button>
                                </div>
                            )}
                            
                            {modalType === 'vehicle' && (
                                <div className="space-y-6 leading-none leading-none leading-none">
                                    <input className="w-full input-modern font-bold text-xl uppercase italic text-indigo-600 shadow-sm leading-none shadow-sm leading-none leading-none leading-none" placeholder="Identificación del Equipo" onChange={e => setForm({...form, nombre: e.target.value})} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none leading-none leading-none leading-none leading-none">
                                        <input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Marca" onChange={e => setForm({...form, marca: e.target.value})} />
                                        <input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Modelo" onChange={e => setForm({...form, modelo: e.target.value})} />
                                        <input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Serie" onChange={e => setForm({...form, serie: e.target.value})} />
                                        <input className="w-full input-modern shadow-sm shadow-sm leading-none leading-none leading-none" placeholder="Patente" onChange={e => setForm({...form, patente: e.target.value})} />
                                        <div className="space-y-1 leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-indigo-600 uppercase ml-2 italic leading-none leading-none leading-none">Ciclo HS</label><input className="w-full input-modern shadow-sm leading-none leading-none leading-none" type="number" defaultValue="250" onChange={e => setForm({...form, serviceInterval: e.target.value})} /></div>
                                        <div className="space-y-1 leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none leading-none leading-none">Horómetro Actual</label><input className="w-full input-modern mono text-xl leading-none shadow-sm shadow-sm leading-none leading-none leading-none" type="number" placeholder="0.0" onChange={e => setForm({...form, horometro: e.target.value})} /></div>
                                    </div>
                                    <button onClick={handleAddVehicle} className="btn-modern w-full p-5 rounded-3xl mt-4 shadow-xl uppercase text-sm leading-none leading-none leading-none leading-none">Vincular</button>
                                </div>
                            )}

                            {modalType === 'log' && (
                                <div className="space-y-6 text-center leading-none leading-none leading-none">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 leading-none leading-none leading-none leading-none leading-none">
                                        <div className="space-y-2 leading-none leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-indigo-500 uppercase italic tracking-widest leading-none leading-none leading-none leading-none">Lectura Horómetro</label><input className="w-full p-6 rounded-2xl input-modern mono text-4xl text-center text-indigo-600 leading-none shadow-sm shadow-sm leading-none leading-none leading-none" type="number" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} /></div>
                                        <div className="space-y-2 leading-none leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-amber-500 uppercase italic tracking-widest leading-none leading-none leading-none leading-none">Litros Cargados</label><input className="w-full p-6 rounded-2xl input-modern mono text-4xl text-center text-amber-600 leading-none shadow-sm shadow-sm leading-none leading-none leading-none" type="number" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} /></div>
                                    </div>
                                    <textarea className="w-full input-modern min-h-[100px] italic font-semibold text-sm leading-none leading-none leading-none leading-none leading-none" placeholder="Observaciones..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    {(!form.horas || !form.litros) && <div className="p-3 bg-rose-50 text-rose-600 rounded-xl text-[10px] font-black uppercase tracking-widest leading-none leading-none leading-none animate-pulse leading-none">Debe completar todos los campos</div>}
                                    <button disabled={!form.horas || !form.litros} onClick={handleDailyLog} className="btn-modern w-full p-6 rounded-3xl shadow-xl italic uppercase text-xs leading-none leading-none leading-none leading-none leading-none leading-none">Guardar Registro</button>
                                </div>
                            )}

                            {modalType === 'details' && activeCompany && (
                                <div className="space-y-8 animate-fade-in leading-none leading-none leading-none">
                                    <div className="flex justify-between items-center bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner leading-none leading-none leading-none">
                                        <div className="space-y-1 leading-none leading-none leading-none"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none leading-none leading-none">Estado Depósito</p><p className="text-3xl font-black text-slate-800 mono leading-none leading-none leading-none">{(activeCompany.currentFuel || 0).toLocaleString()} L</p></div>
                                        <button onClick={refillTank} className="px-6 py-3 bg-emerald-500 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100 transition-all leading-none leading-none leading-none">Reponer Tanque</button>
                                    </div>
                                    <div className="space-y-4 leading-none leading-none leading-none leading-none">
                                        <div className="flex justify-between items-center px-2 leading-none leading-none leading-none leading-none leading-none"><h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 italic leading-none leading-none leading-none leading-none leading-none leading-none"><Icon name="chart" size={14}/> Evolución Consumo</h4></div>
                                        <div className="p-4 bg-white rounded-3xl border border-slate-100 leading-none leading-none leading-none leading-none leading-none leading-none leading-none leading-none"><canvas ref={chartRef}></canvas></div>
                                    </div>
                                </div>
                            )}

                            {modalType === 'downtime' && (
                                <div className="space-y-5 leading-none leading-none leading-none">
                                    <div className="p-6 bg-rose-50 border border-rose-100 rounded-3xl flex items-center gap-4 leading-none leading-none leading-none leading-none leading-none leading-none"><Icon name="alert" size={32} className="text-rose-600 animate-pulse shrink-0"/><p className="text-xs font-black text-rose-600 uppercase tracking-widest leading-tight leading-none leading-none leading-none leading-none leading-none">NOTIFICACIÓN INMEDIATA DE AVERÍA AL PANEL DE CONTROL.</p></div>
                                    <textarea className="w-full input-modern min-h-[150px] italic font-semibold shadow-sm leading-none leading-none leading-none leading-none leading-none" placeholder="Describa el motivo..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                    <button onClick={handleConfirmDowntime} className="w-full p-6 bg-rose-600 rounded-3xl font-black text-white shadow-xl uppercase text-xs italic leading-none leading-none leading-none leading-none leading-none">Emitir Alerta</button>
                                </div>
                            )}

                            {modalType === 'historical' && (
                                <div className="space-y-6 leading-none leading-none leading-none">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none leading-none leading-none">
                                        <select className="w-full input-modern text-xs font-bold leading-none leading-none shadow-sm leading-none leading-none leading-none" value={form.tipoHistorial} onChange={e => setForm({...form, tipoHistorial: e.target.value})}><option value="REGISTRO">USO (HORÓMETRO)</option><option value="SERVICE">SERVICE</option><option value="ALTA">ALTA</option></select>
                                        <input className="w-full input-modern text-xs uppercase leading-none leading-none shadow-sm leading-none leading-none leading-none" type="date" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                        <div className="space-y-1 leading-none leading-none leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 ml-2 italic uppercase leading-none leading-none leading-none leading-none">Horas</label><input className="w-full input-modern mono leading-none leading-none shadow-sm shadow-sm leading-none leading-none leading-none" type="number" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} /></div>
                                        <div className="space-y-1 leading-none leading-none leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 ml-2 italic uppercase leading-none leading-none leading-none leading-none">Combustible</label><input className="w-full input-modern mono leading-none leading-none shadow-sm shadow-sm leading-none leading-none leading-none" type="number" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} /></div>
                                    </div>
                                    <button onClick={handleHistoricalData} className="btn-modern w-full p-5 rounded-3xl shadow-xl italic uppercase text-xs leading-none leading-none leading-none leading-none leading-none leading-none">Sincronizar</button>
                                </div>
                            )}
                        </Modal>
                    )}

                    {scannerActive && (
                        <div className="fixed inset-0 z-[200] bg-slate-950/95 flex items-center justify-center p-8 animate-fade-in leading-none leading-none leading-none leading-none leading-none leading-none">
                            <div className="w-full max-w-md space-y-8 text-center leading-none leading-none leading-none leading-none leading-none leading-none">
                                <div id="reader" className="shadow-2xl border-4 border-indigo-600 bg-black leading-none leading-none leading-none leading-none leading-none leading-none leading-none"></div>
                                <button onClick={() => { setScannerActive(false); if(scannerRef.current) scannerRef.current.stop(); }} className="px-12 py-5 bg-white rounded-3xl font-black text-xs uppercase leading-none leading-none hover:bg-rose-600 leading-none leading-none leading-none leading-none leading-none">Cerrar</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
