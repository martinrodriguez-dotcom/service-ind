<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ServicePro EAM | Industrial Asset Management</title>
    
    <!-- CORE LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF GENERATION LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- FIREBASE SETUP -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_RnRMxTrKDcNtyLfPRxHxVpqnKhTFemQ",
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');
        
        :root {
            --hazard-orange: #ea580c;
            --industrial-dark: #020617;
            --panel-bg: #0f172a;
            --border-heavy: #1e293b;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--industrial-dark); 
            color: #f1f5f9; 
            overflow: hidden; 
        }

        .mono { font-family: 'Roboto Mono', monospace; }

        .hazard-stripe {
            background: repeating-linear-gradient(
                45deg,
                #ea580c,
                #ea580c 10px,
                #020617 10px,
                #020617 20px
            );
        }

        .industrial-card {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 2px solid var(--border-heavy);
            border-top-width: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .lcd-display {
            background: #000;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            border: 2px inset #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }

        .lcd-display-alert {
            color: #ff3e3e;
            text-shadow: 0 0 8px #ff3e3e;
        }

        .btn-industrial {
            background: var(--hazard-orange);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .btn-industrial:active { transform: translateY(2px); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--industrial-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes pulse-border {
            0% { border-color: #ea580c; }
            50% { border-color: #7c2d12; }
            100% { border-color: #ea580c; }
        }
        .critical-pulse { animation: pulse-border 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON SYSTEM (Native SVG) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zM3 16h7v5H3v-5z"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5M7 7h10"/>,
                plus: <path d="M12 5v14M5 12h14"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2m-10 0a3 3 0 106 0m-10 0h10m11 0a3 3 0 106 0m-6 0H2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z"/>,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                hash: <path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/>,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                x: <path d="M18 6L6 18M6 6l12 12"/>,
                save: <React.Fragment><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
                chevronLeft: <polyline points="15 18 9 12 15 6"/>,
                gauge: <React.Fragment><path d="M12 2a10 10 0 0110 10M12 2a10 10 0 00-10 10m20 0a10 10 0 01-10 10m-10-10a10 10 0 0010 10"/><path d="M12 12l4-4"/></React.Fragment>,
                download: <React.Fragment><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></React.Fragment>,
                info: <React.Fragment><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></React.Fragment>,
                check: <polyline points="20 6 9 17 4 12"/>
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2.5" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const SERVICE_INTERVAL = 250; 

        // --- PDF GENERATOR FUNCTION ---
        const downloadPDF = (company, vehicle) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFillColor(2, 6, 23);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(234, 88, 12);
            doc.setFontSize(22);
            doc.text("SERVICEPRO EAM - REPORTE TÉCNICO", 15, 25);
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text(`EMPRESA: ${company.nombre}`, 15, 35);
            doc.text(`FECHA REPORTE: ${new Date().toLocaleDateString()}`, 150, 35);

            // Asset Info
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(14);
            doc.text(`DATOS DEL EQUIPO: ${vehicle.nombre}`, 15, 55);
            doc.setFontSize(10);
            doc.text(`HORÓMETRO ACTUAL: ${vehicle.horometroTotal} HS`, 15, 65);
            doc.text(`ESTADO: ${vehicle.operativo ? 'OPERATIVO' : 'FUERA DE SERVICIO'}`, 15, 72);

            // Table of Events
            const rows = (vehicle.eventos || []).map(ev => [
                ev.fecha, 
                ev.tipo, 
                `${ev.horas || '-'} hs`, 
                ev.nota || ev.motivo || '-'
            ]);

            doc.autoTable({
                startY: 85,
                head: [['Fecha', 'Tipo Evento', 'Horómetro', 'Detalle/Insumos']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [234, 88, 12] }
            });

            doc.save(`Reporte_${vehicle.nombre.replace(/\s/g, '_')}.pdf`);
        };

        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-sm" onClick={onClose} />
                <div className="relative w-full max-w-xl bg-slate-900 border-t-4 border-orange-600 rounded-lg shadow-2xl overflow-hidden">
                    <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-6 bg-orange-600"></div>
                            <h3 className="text-xl font-black uppercase tracking-tight">{title}</h3>
                        </div>
                        <button onClick={onClose} className="p-2 hover:bg-red-600 rounded transition-colors">
                            <Icon name="x" size={20} />
                        </button>
                    </div>
                    <div className="p-8">
                        {children}
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [companies, setCompanies] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [loading, setLoading] = useState(true);
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            const [form, setForm] = useState({ nombre: '', cuit: '', responsable: '', horometro: '', horas: '', nota: '', motivo: '' });

            useEffect(() => {
                if (!window.fb || !window.db) return;
                const q = window.fb.query(window.fb.collection(window.db, "companies"));
                const unsubscribe = window.fb.onSnapshot(q, (snapshot) => {
                    setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsubscribe();
            }, []);

            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(c => {
                    (c.vehiculos || []).forEach(v => {
                        const horasUso = (v.horometroTotal || 0) - (v.ultimoServiceHoras || 0);
                        const rest = SERVICE_INTERVAL - horasUso;
                        if (rest < 50) list.push({ ...v, empresaNombre: c.nombre, empresaId: c.id, rest });
                    });
                });
                return list.sort((a, b) => a.rest - b.rest);
            }, [companies]);

            // --- FIREBASE OPERATIONS ---
            const handleAddCompany = async () => {
                if(!form.nombre) return;
                await window.fb.addDoc(window.fb.collection(window.db, "companies"), { 
                    nombre: form.nombre.toUpperCase(), cuit: form.cuit || "S/D", responsable: form.responsable || "S/D", vehiculos: [] 
                });
                setModalType(null); setForm({});
            };

            const handleAddVehicle = async () => {
                if(!form.nombre || !selectedCompany) return;
                const ref = window.fb.doc(window.db, "companies", selectedCompany.id);
                const h = parseFloat(form.horometro) || 0;
                const v = { 
                    id: Date.now(), nombre: form.nombre.toUpperCase(), 
                    horometroTotal: h, ultimoServiceHoras: h, 
                    operativo: true, eventos: [{ tipo: 'ALTA', fecha: new Date().toLocaleDateString(), horas: h }] 
                };
                await window.fb.updateDoc(ref, { vehiculos: window.fb.arrayUnion(v) });
                setModalType(null); setForm({});
            };

            const handleUpdateHours = async () => {
                const nuevaLectura = parseFloat(form.horas);
                if(isNaN(nuevaLectura) || !selectedCompany) return;
                const company = companies.find(c => c.id === selectedCompany.id);
                const updated = company.vehiculos.map(v => v.id === activeVehicleId ? { 
                    ...v, 
                    horometroTotal: nuevaLectura,
                    eventos: [...(v.eventos || []), { tipo: 'REGISTRO', fecha: new Date().toLocaleDateString(), horas: nuevaLectura }]
                } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", selectedCompany.id), { vehiculos: updated });
                setModalType(null); setForm({});
            };

            const handleToggleStatus = async (vehicleId, currentStatus) => {
                if (currentStatus) { // Quieren dar de baja
                    setActiveVehicleId(vehicleId);
                    setModalType('downtime');
                } else { // Quieren volver a dar de alta
                    const company = companies.find(c => c.id === selectedCompany.id);
                    const updated = company.vehiculos.map(v => v.id === vehicleId ? { 
                        ...v, operativo: true, 
                        eventos: [...(v.eventos || []), { tipo: 'ALTA', fecha: new Date().toLocaleDateString(), nota: 'Vuelta a servicio' }]
                    } : v);
                    await window.fb.updateDoc(window.fb.doc(window.db, "companies", selectedCompany.id), { vehiculos: updated });
                }
            };

            const handleConfirmDowntime = async () => {
                const company = companies.find(c => c.id === selectedCompany.id);
                const updated = company.vehiculos.map(v => v.id === activeVehicleId ? { 
                    ...v, operativo: false, 
                    eventos: [...(v.eventos || []), { tipo: 'BAJA', fecha: new Date().toLocaleDateString(), motivo: form.motivo }]
                } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", selectedCompany.id), { vehiculos: updated });
                setModalType(null); setForm({});
            };

            const handleCompleteService = async () => {
                const company = companies.find(c => c.id === selectedCompany.id);
                const updated = company.vehiculos.map(v => v.id === activeVehicleId ? { 
                    ...v, 
                    ultimoServiceHoras: v.horometroTotal,
                    eventos: [...(v.eventos || []), { tipo: 'SERVICE', fecha: new Date().toLocaleDateString(), horas: v.horometroTotal, nota: form.nota }]
                } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "companies", selectedCompany.id), { vehiculos: updated });
                setModalType(null); setForm({});
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950">
                    <Icon name="wrench" size={60} className="text-orange-600 animate-spin mb-4" />
                    <p className="mono font-bold text-orange-600 tracking-widest animate-pulse uppercase italic">Industrial Boot Sequence...</p>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-24 lg:w-80 border-r-2 border-slate-800 bg-slate-950 p-6 flex flex-col gap-12 z-50">
                        <div className="flex items-center gap-4 justify-center lg:justify-start">
                            <div className="bg-orange-600 p-2 rounded transform rotate-45 shadow-lg shadow-orange-900/50">
                                <Icon name="wrench" size={28} className="text-white transform -rotate-45" />
                            </div>
                            <div className="hidden lg:block leading-none">
                                <h1 className="text-2xl font-black uppercase tracking-tighter italic">ServicePro</h1>
                                <p className="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Enterprise v5.0</p>
                            </div>
                        </div>
                        
                        <nav className="flex flex-col gap-4 flex-1">
                            {[
                                { id: 'dashboard', icon: 'dashboard', label: 'Monitor Alertas' },
                                { id: 'companies', icon: 'company', label: 'Unidades Activos' }
                            ].map(item => (
                                <button key={item.id} onClick={() => {setActiveTab(item.id); setSelectedCompany(null);}} 
                                    className={`group relative p-4 rounded-lg flex items-center gap-4 transition-all ${activeTab === item.id ? 'bg-slate-900 border-l-4 border-orange-600' : 'text-slate-500 hover:bg-slate-900/50'}`}>
                                    <Icon name={item.icon} size={22} className={activeTab === item.id ? 'text-orange-500' : ''}/>
                                    <span className="hidden lg:block font-black uppercase text-xs tracking-widest">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="hazard-stripe h-2 w-full opacity-20"></div>
                    </aside>

                    {/* MAIN OPERATIONS */}
                    <main className="flex-1 overflow-y-auto bg-slate-950 relative">
                        <div className="p-8 lg:p-16 relative z-10">
                            {activeTab === 'dashboard' && (
                                <div className="max-w-6xl mx-auto space-y-12">
                                    <header className="flex justify-between items-end border-b-2 border-slate-800 pb-8">
                                        <div className="space-y-1">
                                            <h2 className="text-6xl font-black tracking-tighter uppercase italic">Monitor Central</h2>
                                            <p className="text-orange-500 mono text-xs font-bold tracking-[0.3em]">ESTADO OPERACIONAL Y ALERTAS CRÍTICAS</p>
                                        </div>
                                    </header>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {alerts.map((a, i) => (
                                            <div key={i} onClick={() => { setSelectedCompany(companies.find(c => c.id === a.empresaId)); setActiveTab('companies'); }}
                                                className={`industrial-card p-1 group flex flex-col cursor-pointer overflow-hidden ${a.rest < 20 ? 'critical-pulse' : ''}`}>
                                                <div className="hazard-stripe h-2 w-full opacity-20"></div>
                                                <div className="p-8 flex justify-between items-center">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`p-4 rounded ${a.rest < 20 ? 'bg-red-600 animate-pulse' : 'bg-orange-600'}`}>
                                                            <Icon name="alert" size={32} className="text-white"/>
                                                        </div>
                                                        <div>
                                                            <p className="text-2xl font-black tracking-tight uppercase">{a.nombre}</p>
                                                            <p className="text-slate-500 font-bold text-[10px] tracking-widest">{a.empresaNombre}</p>
                                                        </div>
                                                    </div>
                                                    <div className="lcd-display mono text-2xl font-bold">-{a.rest.toFixed(1)} HS</div>
                                                </div>
                                            </div>
                                        ))}
                                        {alerts.length === 0 && (
                                            <div className="col-span-full py-32 flex flex-col items-center justify-center border-4 border-dashed border-slate-900 rounded-3xl opacity-20">
                                                <Icon name="wrench" size={80} />
                                                <p className="mt-4 font-black uppercase tracking-[0.5em] text-sm">Flota Nominal: Sin alertas críticas</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'companies' && !selectedCompany && (
                                <div className="max-w-7xl mx-auto space-y-12">
                                    <header className="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6">
                                        <h2 className="text-6xl font-black tracking-tighter uppercase italic">Directorio</h2>
                                        <button onClick={() => setModalType('company')} className="btn-industrial px-12 py-5 rounded shadow-xl flex items-center gap-3 text-sm">
                                            <Icon name="plus" size={20} className="stroke-[4px]"/> Nueva Empresa
                                        </button>
                                    </header>

                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                                        {companies.map(emp => (
                                            <div key={emp.id} onClick={() => setSelectedCompany(emp)} className="industrial-card p-8 cursor-pointer flex flex-col group relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-2 h-full bg-orange-600 opacity-20 group-hover:opacity-100 transition-opacity"></div>
                                                <h3 className="text-3xl font-black tracking-tighter mb-4 uppercase leading-none italic">{emp.nombre}</h3>
                                                <div className="mt-auto pt-6 border-t border-slate-800/50 flex justify-between items-center">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">CUIT_ID</p>
                                                        <p className="mono text-xs font-bold text-slate-300">{emp.cuit}</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-3xl font-black italic">{emp.vehiculos?.length || 0}</p>
                                                        <p className="text-[8px] font-black text-orange-500 uppercase tracking-widest">Assets</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {selectedCompany && (
                                <div className="max-w-7xl mx-auto space-y-12">
                                    <button onClick={() => setSelectedCompany(null)} className="flex items-center gap-2 mono text-xs font-bold text-slate-500 hover:text-orange-500 transition-all uppercase tracking-widest">
                                        <Icon name="chevronLeft" size={16}/> BACK_TO_LIST
                                    </button>

                                    <div className="bg-slate-900 border-2 border-slate-800 p-10 lg:p-16 rounded shadow-inner flex flex-col lg:flex-row justify-between items-start lg:items-end gap-12">
                                        <div className="space-y-4">
                                            <h2 className="text-7xl font-black tracking-tighter leading-none uppercase italic">{selectedCompany.nombre}</h2>
                                            <div className="flex flex-wrap gap-4">
                                                <div className="px-6 py-2 bg-slate-950 border border-slate-800 rounded flex items-center gap-3 text-[10px] font-bold text-slate-500 tracking-widest uppercase"><Icon name="hash" size={14}/> {selectedCompany.cuit}</div>
                                                <div className="px-6 py-2 bg-orange-600/10 border border-orange-600/30 rounded flex items-center gap-3 text-[10px] font-bold text-orange-500 tracking-widest uppercase italic"><Icon name="user" size={14}/> {selectedCompany.responsable}</div>
                                            </div>
                                        </div>
                                        <button onClick={() => setModalType('vehicle')} className="btn-industrial px-10 py-5 rounded shadow-xl flex items-center gap-3 text-xs italic"><Icon name="plus" size={18} className="stroke-[4px]"/> Vincular Nuevo Asset</button>
                                    </div>

                                    <div className="space-y-8">
                                        {(selectedCompany.vehiculos || []).map(v => {
                                            const rest = SERVICE_INTERVAL - (v.horometroTotal - v.ultimoServiceHoras);
                                            const perc = Math.max(0, (rest / SERVICE_INTERVAL) * 100);
                                            
                                            return (
                                                <div key={v.id} className="industrial-card p-10 flex flex-col xl:flex-row items-center gap-12 relative overflow-hidden">
                                                    <div className={`absolute top-0 right-0 px-10 py-2 mono text-[10px] font-bold tracking-widest uppercase ${v.operativo ? 'bg-emerald-600' : 'bg-red-600'}`}>
                                                        {v.operativo ? 'NOMINAL' : 'TECHNICAL_STOP'}
                                                    </div>

                                                    <div className="flex-1 w-full space-y-8">
                                                        <div className="flex items-center gap-8">
                                                            <div className="p-6 bg-slate-950 border-2 border-slate-800 rounded-lg text-slate-600 shadow-inner">
                                                                <Icon name="truck" size={48}/>
                                                            </div>
                                                            <div>
                                                                <h4 className="text-4xl font-black tracking-tighter uppercase italic">{v.nombre}</h4>
                                                                <div className="flex items-center gap-4 mt-2">
                                                                    <div className="lcd-display mono text-lg font-bold">{v.horometroTotal.toLocaleString()} HS</div>
                                                                    <button onClick={() => downloadPDF(selectedCompany, v)} className="p-2 bg-slate-800 rounded hover:bg-orange-600 hover:text-white transition-all"><Icon name="download" size={16}/></button>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="space-y-4">
                                                            <div className="flex justify-between items-end">
                                                                <div className="flex items-center gap-3"><Icon name="gauge" size={16} className="text-orange-600"/><span className="text-[10px] font-black uppercase text-slate-500 tracking-widest italic">Vida Aceite</span></div>
                                                                <span className={`mono text-2xl font-bold ${rest < 50 ? 'text-red-500 animate-pulse' : 'text-slate-300'}`}>{perc.toFixed(1)}%</span>
                                                            </div>
                                                            <div className="h-4 w-full bg-black border border-slate-800 rounded-sm overflow-hidden p-1">
                                                                <div className={`h-full transition-all duration-1000 ${rest < 50 ? 'bg-red-600' : 'bg-orange-600'}`} style={{width: `${perc}%`}}></div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-row xl:flex-col gap-4 w-full xl:w-72">
                                                        <button onClick={() => { setActiveVehicleId(v.id); setModalType('log'); }} className="flex-1 p-5 bg-slate-800 hover:bg-slate-700 rounded mono text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-3 transition-all border border-slate-700">
                                                            <Icon name="clock" size={16}/> Log_Horas
                                                        </button>
                                                        <button onClick={() => handleToggleStatus(v.id, v.operativo)} className={`flex-1 p-5 rounded mono text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-3 transition-all ${v.operativo ? 'bg-slate-950 text-red-500 border border-red-900/40 hover:bg-red-950' : 'bg-emerald-600 text-white'}`}>
                                                            {v.operativo ? <Icon name="alert" size={16}/> : <Icon name="check" size={16}/>} {v.operativo ? 'Informar Baja' : 'Activar Unidad'}
                                                        </button>
                                                        <button onClick={() => { setActiveVehicleId(v.id); setModalType('service'); }} className="flex-1 p-5 bg-orange-600 hover:bg-orange-500 rounded mono text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-3 shadow-lg shadow-orange-900/40">
                                                            <Icon name="wrench" size={16}/> Clear_Service
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* MODALES DINÁMICOS */}
                    {modalType === 'company' && (
                        <Modal title="Alta Razón Social" onClose={() => setModalType(null)}>
                            <div className="space-y-6">
                                <input className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded font-black text-xl outline-none focus:border-orange-600 transition-all uppercase italic" 
                                    placeholder="NOMBRE EMPRESA" value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                                <input className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded mono font-bold outline-none focus:border-orange-600" 
                                    placeholder="CUIT_ID" value={form.cuit} onChange={e => setForm({...form, cuit: e.target.value})} />
                                <input className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded font-bold outline-none focus:border-orange-600" 
                                    placeholder="RESPONSABLE" value={form.responsable} onChange={e => setForm({...form, responsable: e.target.value})} />
                                <button onClick={handleAddCompany} className="btn-industrial w-full p-6 rounded shadow-2xl flex items-center justify-center gap-3"><Icon name="save" size={20}/> Ejecutar Alta</button>
                            </div>
                        </Modal>
                    )}

                    {modalType === 'vehicle' && (
                        <Modal title="Vinculación Activo" onClose={() => setModalType(null)}>
                            <div className="space-y-6">
                                <input className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded font-black text-xl outline-none focus:border-orange-600 transition-all uppercase" 
                                    placeholder="MODELO / INTERNO EQUIPO" value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                                <input className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded mono text-2xl font-bold outline-none focus:border-orange-600 text-center" type="number"
                                    placeholder="HORÓMETRO ACTUAL" value={form.horometro} onChange={e => setForm({...form, horometro: e.target.value})} />
                                <button onClick={handleAddVehicle} className="btn-industrial w-full p-6 rounded shadow-2xl">Confirmar Registro</button>
                            </div>
                        </Modal>
                    )}

                    {modalType === 'log' && (
                        <Modal title="Lectura de Campo" onClose={() => setModalType(null)}>
                            <div className="space-y-6">
                                <div className="p-6 bg-black rounded text-center border border-slate-800 shadow-inner">
                                    <p className="text-[10px] font-black uppercase text-slate-500 mb-1">Último Registro</p>
                                    <p className="mono text-4xl font-bold text-orange-600">{companies.find(c => c.id === selectedCompany.id).vehiculos.find(v => v.id === activeVehicleId).horometroTotal.toLocaleString()} HS</p>
                                </div>
                                <input className="w-full p-8 bg-slate-950 border-4 border-orange-600/20 rounded mono text-5xl font-bold text-center outline-none focus:border-orange-600" type="number" autoFocus
                                    placeholder="..." value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} />
                                <button onClick={handleUpdateHours} className="btn-industrial w-full p-6 rounded shadow-2xl italic tracking-widest">Actualizar Horómetro</button>
                            </div>
                        </Modal>
                    )}

                    {modalType === 'downtime' && (
                        <Modal title="Informar Baja Técnica" onClose={() => setModalType(null)}>
                            <div className="space-y-6">
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest italic">Especifique el motivo de parada para el historial:</p>
                                <textarea className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded font-bold min-h-[150px] outline-none focus:border-red-600 italic" 
                                    placeholder="Ej: Falla en bomba hidráulica, esperando repuestos..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                <button onClick={handleConfirmDowntime} className="bg-red-600 hover:bg-red-500 w-full p-6 rounded font-black uppercase shadow-2xl transition-all">Sellar Parada Técnica</button>
                            </div>
                        </Modal>
                    )}

                    {modalType === 'service' && (
                        <Modal title="Mantenimiento Finalizado" onClose={() => setModalType(null)}>
                            <div className="space-y-6">
                                <div className="p-10 bg-emerald-600/5 border-2 border-emerald-600/20 rounded text-center">
                                    <Icon name="check" size={50} className="mx-auto text-emerald-500 mb-4"/>
                                    <p className="text-[10px] font-black uppercase text-emerald-500 italic">Clear Cycle Service</p>
                                    <p className="mono text-2xl font-bold text-slate-200 mt-2 italic">{companies.find(c => c.id === selectedCompany.id).vehiculos.find(v => v.id === activeVehicleId).horometroTotal.toLocaleString()} HS</p>
                                </div>
                                <textarea className="w-full p-6 bg-slate-950 border-2 border-slate-800 rounded font-bold min-h-[180px] outline-none focus:border-emerald-600 italic" 
                                    placeholder="DETALLE TÉCNICO E INSUMOS (EJ: ACEITE 15W40, FILTROS CAT 1R-1807...)" value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                <button onClick={handleCompleteService} className="bg-emerald-600 hover:bg-emerald-500 w-full p-7 rounded font-black uppercase tracking-widest shadow-2xl italic">Guardar Reporte Service</button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
