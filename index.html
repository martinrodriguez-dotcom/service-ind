<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BND - Control de Activos</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> </head>
<body>
    <div id="root"></div>

    <script type="module" src="./firebaseConfig.js"></script>
    <script type="text/babel" src="./Icons.jsx"></script>
    <script type="text/babel" src="./Components.jsx"></script>
    
    <script type="text/babel" src="./AppViews.jsx"></script>
    <script type="text/babel" src="./AppModals.jsx"></script>
    
    <script type="text/babel" src="./App.jsx"></script>

    <script type="text/babel">
        const initApp = () => {
            if (window.App && window.Icons && window.Components && window.AppViews && window.AppModals) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<window.App />);
            } else {
                setTimeout(initApp, 50);
            }
        };
        initApp();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Falló: ', err));
            });
        }
    </script>
</body>
</html>
