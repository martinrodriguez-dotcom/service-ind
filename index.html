<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BND Equipos | EAM Industrial Premium</title>
    
    <!-- LIBRERÍAS CORE -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS ESPECIALIZADAS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary-yellow: #fbbf24;
            --primary-dark: #0f172a;
            --bg-app: #f8fafc;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app); 
            color: #0f172a; 
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Estética Premium Moderna */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            border-radius: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.08);
            border-color: var(--primary-yellow);
        }

        .btn-premium {
            background: var(--primary-dark);
            color: white;
            font-weight: 700;
            border-radius: 1.25rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-premium:hover:not(:disabled) {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-accent {
            background: var(--primary-yellow);
            color: #000000;
            font-weight: 800;
            border-radius: 1.25rem;
            box-shadow: 0 4px 15px -3px rgba(251, 191, 36, 0.3);
            transition: all 0.2s;
        }

        .btn-accent:hover:not(:disabled) {
            background: #f59e0b;
            transform: translateY(-1px);
        }

        .input-premium {
            background: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 1.25rem;
            padding: 1rem 1.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .input-premium:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
        }

        .fuel-tank-container {
            width: 150px;
            height: 75px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.06));
        }

        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @media (max-width: 1024px) {
            .sidebar-mobile {
                position: fixed;
                left: 0; top: 0; height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                background: white;
                box-shadow: 20px 0 50px rgba(0,0,0,0.1);
            }
            .sidebar-mobile.open { transform: translateX(0); }
        }

        .history-table th {
            text-align: left;
            padding: 14px 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            font-weight: 800;
        }
        .history-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- FIREBASE INITIALIZATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_RnRMxTrKDcNtyLfPRxHxVpqnKhTFemQ",
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            window.db = db;
            window.auth = auth;
            window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
            window.appId = "bnd-premium-v3-stable"; 
            
            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.warn("Auth Fallback Active");

                window.dispatchEvent(new Event('firebase-ready'));
            };
            initAuth();
            
        } catch (error) {
            console.error("Error crítico de Firebase:", error);
        }
    </script>

    <!-- REACT APPLICATION -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SERVICE_INTERVAL_DEFAULT = 250;

        // --- SISTEMA DE ICONOS SVG ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 11h7v10H3V11z" strokeWidth="2"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" strokeWidth="2.5"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" strokeWidth="2"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2" strokeWidth="2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z" strokeWidth="2"/>,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeWidth="2"/>,
                chevronLeft: <path d="M15 18l-6-6 6-6" strokeWidth="2.5"/>,
                x: <path d="M18 6L6 18M6 6l12 12" strokeWidth="2.5"/>,
                check: <path d="M20 6L9 17l-5-5" strokeWidth="2.5"/>,
                fuel: <React.Fragment><path d="M3 22V8c0-2.1 1.7-3.8 3.8-3.8h7.5c2.1 0 3.8 1.7 3.8 3.8v14M4 9h13"/><path d="M19 8h1a2 2 0 012 2v6a2 2 0 01-2 2h-1M19 18h2"/><circle cx="10" cy="13" r="3"/></React.Fragment>,
                history: <React.Fragment><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 11.5 4m-.5 5v-5h5"/></React.Fragment>,
                menu: <path d="M3 12h18M3 6h18M3 18h18" strokeWidth="2.5" />,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                chart: <path d="M18 20V10M12 20V4M6 20v-6" strokeWidth="2" />,
                qr: <React.Fragment><rect x="3" y="3" width="7" height="7" strokeWidth="2"/><rect x="14" y="3" width="7" height="7" strokeWidth="2"/><rect x="3" y="14" width="7" height="7" strokeWidth="2"/><path d="M14 14h3v3h-3v-3zm3 3h3v3h-3v-3zm-3 3h3v-3" strokeWidth="2"/></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9" strokeWidth="2" />,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 000.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" strokeWidth="2"/></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        // --- COMPONENTE MODAL ---
        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 animate-fade-in">
                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onClick={onClose} />
                <div className="relative w-full max-w-2xl bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-white/20">
                    <div className="px-8 py-6 border-b flex justify-between items-center bg-slate-50/50">
                        <h3 className="text-xl font-extrabold text-slate-800 tracking-tight uppercase italic leading-none">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full transition-all text-slate-400"><Icon name="x" size={24} /></button>
                    </div>
                    <div className="p-10 max-h-[85vh] overflow-y-auto leading-relaxed">{children}</div>
                </div>
            </div>
        );

        // --- COMPONENTE TANQUE PREMIUM ---
        const FuelTankCapsule = ({ capacity, current }) => {
            const perc = capacity > 0 ? Math.max(0, Math.min(100, (current / capacity) * 100)) : 0;
            let color = "#10b981"; // Verde
            if (perc <= 50) color = "#f59e0b"; // Amarillo
            if (perc <= 25) color = "#ef4444"; // Rojo

            return (
                <div className="flex flex-col items-center gap-2">
                    <div className="fuel-tank-container">
                        <svg viewBox="0 0 140 80" className="w-full h-full">
                            <defs>
                                <linearGradient id="tankGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stopColor={color} stopOpacity="0.7" />
                                    <stop offset="100%" stopColor={color} stopOpacity="1" />
                                </linearGradient>
                            </defs>
                            <rect x="10" y="10" width="120" height="60" rx="30" fill="#f1f5f9" stroke="#e2e8f0" strokeWidth="2" />
                            <clipPath id="tankClip">
                                <rect x="10" y={70 - (perc * 0.6)} width="120" height={perc * 0.6} rx="2" />
                            </clipPath>
                            <rect x="10" y="10" width="120" height="60" rx="30" fill="url(#tankGrad)" clipPath="url(#tankClip)" />
                            <text x="70" y="45" textAnchor="middle" className="font-black text-[14px] mono" fill={perc < 45 ? "#64748b" : "white"}>{perc.toFixed(0)}%</text>
                            <text x="70" y="85" textAnchor="middle" className="font-bold text-[8px] uppercase" fill="#94a3b8">BND Diésel</text>
                        </svg>
                    </div>
                    <span className="text-[10px] font-black uppercase text-slate-400 italic">{Math.floor(current).toLocaleString()} L restantes</span>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompanyId, setSelectedCompanyId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [expandedVehicles, setExpandedVehicles] = useState(new Set());
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            const [scannerActive, setScannerActive] = useState(false);
            const scannerRef = useRef(null);
            const chartRef = useRef(null);

            const [bndSettings, setBndSettings] = useState({
                name: "BND EQUIPOS S.A.",
                description: "Mantenimiento Industrial & Gestión de Activos Críticos",
                address: "Parque Logístico BND, Nave 4",
                phone: "+54 9 11 5555-0101",
                email: "tecnica@bndequipos.com",
                web: "www.bndequipos.com"
            });

            const [form, setForm] = useState({ 
                nombre: '', cuit: '', responsable: '', mail: '', tel: '',
                marca: '', modelo: '', serie: '', patente: '', año: '', serviceInterval: 250, 
                horometro: '', horas: '', litros: '', nota: '', motivo: '', tankCapacity: 1000,
                insumos: [], insumoManual: '', fecha: new Date().toISOString().split('T')[0]
            });

            // --- SINCRONIZACIÓN FIREBASE ---
            useEffect(() => {
                const initSync = () => {
                    if (!window.fb || !window.auth) return;
                    window.fb.onAuthStateChanged(window.auth, (u) => {
                        setUser(u);
                        if (u) {
                            const configRef = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info");
                            window.fb.getDoc(configRef).then(snap => { if(snap.exists()) setBndSettings(snap.data()); });

                            const q = window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies");
                            const unsub = window.fb.onSnapshot(q, (snapshot) => {
                                setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                setLoading(false);
                            });
                            return () => unsub();
                        } else { setLoading(false); }
                    });
                };
                if (window.db) initSync();
                else window.addEventListener('firebase-ready', initSync);
            }, []);

            // --- LÓGICA DE ALERTAS ---
            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    const fuelPerc = ((emp.currentFuel || 0) / (emp.tankCapacity || 1000)) * 100;
                    if (fuelPerc <= 25) list.push({ type: 'FUEL', companyName: emp.nombre, companyId: emp.id, value: fuelPerc.toFixed(1) });
                    
                    (emp.vehiculos || []).forEach(veh => {
                        if (!veh.operativo) list.push({ type: 'BREAKDOWN', ...veh, companyId: emp.id, companyName: emp.nombre });
                        const rest = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        if (rest < 50 && veh.operativo) list.push({ type: 'MAINTENANCE', ...veh, companyId: emp.id, companyName: emp.nombre, rest });
                    });
                });
                return list.sort((a,b) => (a.type === 'BREAKDOWN' ? -1 : 1));
            }, [companies]);

            const projections = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const regs = (veh.eventos || []).filter(e => e.tipo === 'REGISTRO').sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
                        let avg = 0;
                        if (regs.length >= 2) {
                            const first = regs[0]; const last = regs[regs.length - 1];
                            const diffHs = (parseFloat(last.horas) || 0) - (parseFloat(first.horas) || 0);
                            const diffDays = Math.max(1, (new Date(last.fecha) - new Date(first.fecha)) / 86400000);
                            avg = diffHs / diffDays;
                        }
                        const restHs = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        let date = null;
                        if (avg > 0 && restHs > 0) {
                            date = new Date(); date.setDate(date.getDate() + Math.ceil(restHs / avg));
                        }
                        list.push({ ...veh, empresaNombre: emp.nombre, companyId: emp.id, estDate: date, avgUsage: avg, restHs: restHs });
                    });
                });
                return list.sort((a,b) => (a.estDate || Infinity) - (b.estDate || Infinity));
            }, [companies]);

            const activeCompany = useMemo(() => companies.find(c => c.id === selectedCompanyId), [companies, selectedCompanyId]);

            // --- GRÁFICOS (CHART.JS) ---
            useEffect(() => {
                if (modalType === 'details' && activeCompany && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    let allEvents = activeCompany.vehiculos.flatMap(v => (v.eventos || []).filter(e => e.litros > 0));
                    
                    const last6Months = Array.from({length: 6}, (_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() - (5 - i));
                        return d.toISOString().substring(0, 7);
                    });

                    const dataPoints = last6Months.map(m => allEvents.filter(e => e.fecha && e.fecha.startsWith(m)).reduce((sum, e) => sum + parseFloat(e.litros || 0), 0));

                    if (window.myChart) window.myChart.destroy();
                    window.myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: last6Months.map(m => ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"][parseInt(m.split('-')[1])-1]),
                            datasets: [{ 
                                label: 'Consumo Mensual (L)', data: dataPoints, 
                                borderColor: '#fbbf24', backgroundColor: 'rgba(251, 191, 36, 0.05)', 
                                fill: true, tension: 0.4, borderWidth: 4, pointRadius: 5, pointBackgroundColor: '#0f172a'
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                    });
                }
            }, [modalType, activeCompany]);

            // --- ACCIONES ---
            const handleDailyLog = async () => {
                if (!form.horas || !form.litros) return;
                const h = parseFloat(form.horas); const l = parseFloat(form.litros);
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, horometroTotal: h, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'REGISTRO', fecha: form.fecha, horas: h, litros: l, nota: form.nota }] } : v);
                const newFuel = Math.max(0, (activeCompany.currentFuel || 0) - l);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated, currentFuel: newFuel });
                setModalType(null); setForm({ ...form, horas: '', litros: '', nota: '' });
            };

            const handleToggleStatus = async (vId, currentStatus) => {
                if(currentStatus) { 
                    setActiveVehicleId(vId); 
                    setModalType('downtime'); 
                } else {
                    const updated = activeCompany.vehiculos.map(v => v.id === vId ? { ...v, operativo: true, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'ALTA', fecha: new Date().toLocaleDateString(), nota: 'Reactivación de Unidad' }] } : v);
                    await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                }
            };

            const handleConfirmDowntime = async () => {
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, operativo: false, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'BAJA', fecha: new Date().toLocaleDateString(), motivo: form.motivo }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({...form, motivo: ''});
            };

            const handleServiceReset = async () => {
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, ultimoServiceHoras: v.horometroTotal, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'SERVICE', fecha: new Date().toLocaleDateString(), horas: v.horometroTotal, insumos: form.insumos, nota: form.nota }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({...form, insumos: [], nota: ''});
            };

            const handleAddCompany = async () => {
                await window.fb.addDoc(window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies"), { nombre: form.nombre, cuit: form.cuit, responsable: form.responsable, tankCapacity: parseFloat(form.tankCapacity) || 1000, currentFuel: parseFloat(form.tankCapacity) || 1000, vehiculos: [] });
                setModalType(null);
            };

            const handleAddVehicle = async () => {
                const ref = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id);
                const h = parseFloat(form.horometro) || 0;

                                    <div className="space-y-3"><label className="text-[11px] font-black uppercase tracking-widest text-slate-400 italic flex items-center gap-2 ml-4">Observaciones Técnicas</label><textarea className="w-full input-premium min-h-[160px] font-bold text-sm uppercase placeholder:text-slate-300" placeholder="Escriba novedades operativas de la jornada..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} /></div>
                                    {(!form.horas || !form.litros) && <div className="p-5 bg-red-50 text-red-600 font-black text-[11px] uppercase rounded-[1.5rem] border border-red-100 animate-pulse">⚠️ Los campos de Horas y Litros son obligatorios</div>}
                                    <button disabled={!form.horas || !form.litros} onClick={handleDailyLog} className="btn-accent w-full p-7 text-sm uppercase shadow-2xl mt-4">Cargar en Bitácora Central</button>
                                </div>
                            )}

                            {modalType === 'service' && (
                                <div className="space-y-12 animate-fade-in">
                                    <div className="bg-slate-900 p-12 rounded-[3rem] text-center shadow-2xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-[300px] h-[300px] bg-white/5 blur-[80px] pointer-events-none"></div>
                                        <p className="text-[12px] font-black uppercase italic mb-4 text-yellow-400 tracking-[0.3em]">Protocolo de Mantenimiento Preventivo</p>
                                        <p className="mono text-7xl font-black italic text-white leading-none">HS {activeCompany?.vehiculos?.find(v => v.id === activeVehicleId)?.horometroTotal?.toLocaleString() || 0}</p>
                                    </div>
                                    <div className="space-y-8">
                                        <label className="text-[13px] font-black uppercase tracking-widest text-slate-800 italic flex items-center gap-3"><Icon name="wrench" size={20}/> Componentes Reemplazados</label>
                                        <div className="flex flex-wrap gap-4">
                                            {['Filtro Aceite', 'Filtro Aire', 'Filtro Combustible', 'Aceite 15W40', 'Grasa Litio', 'Refrigerante'].map(item => (
                                                <button key={item} onClick={() => setForm(prev => ({ ...prev, insumos: prev.insumos.includes(item) ? prev.insumos.filter(i => i !== item) : [...prev.insumos, item] }))} className={`px-6 py-4 rounded-3xl font-black text-[11px] uppercase transition-all border-4 ${form.insumos.includes(item) ? 'bg-slate-900 text-white border-slate-900 shadow-xl' : 'bg-white border-slate-50 text-slate-400 hover:border-yellow-400'}`}>{item}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-5 mt-4">
                                            <input className="flex-1 input-premium p-4 text-xs leading-none" placeholder="Otros repuestos no listados..." value={form.insumoManual} onChange={e => setForm({...form, insumoManual: e.target.value})} />
                                            <button onClick={() => { if(form.insumoManual) setForm(p => ({ ...p, insumos: [...p.insumos, form.insumoManual.toUpperCase()], insumoManual: '' })); }} className="px-10 bg-slate-900 text-white rounded-3xl font-black hover:bg-yellow-400 hover:text-black transition-all shadow-xl font-black text-lg">+</button>
                                        </div>
                                    </div>
                                    <textarea className="w-full input-premium min-h-[180px] font-bold uppercase text-xs shadow-inner" placeholder="Escriba un informe técnico de las tareas realizadas..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    <button onClick={handleServiceReset} className="btn-accent w-full p-7 text-sm uppercase shadow-2xl">Certificar Trabajo y Reiniciar Ciclo</button>
                                </div>
                            )}

                            {modalType === 'details' && activeCompany && (
                                <div className="space-y-12 animate-fade-in leading-none">
                                    <div className="flex justify-between items-center bg-slate-900 p-14 rounded-[4rem] shadow-2xl border-4 border-yellow-400">
                                        <div className="space-y-2">
                                            <p className="text-[13px] font-black uppercase tracking-widest text-yellow-400 italic">Inventario de Diésel</p>
                                            <p className="text-7xl font-black mono text-white leading-none">{(activeCompany.currentFuel || 0).toLocaleString()} <span className="text-xl opacity-30">LTS</span></p>
                                        </div>
                                        <button onClick={refillTank} className="px-12 py-6 bg-white text-slate-900 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-yellow-400 transition-all hover:scale-105 active:scale-95">Reponer Stock</button>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center px-6">
                                            <h4 className="text-[13px] font-black uppercase tracking-widest flex items-center gap-4 italic text-slate-400 leading-none"><Icon name="chart" size={26} className="text-yellow-400"/> Evolución Histórica de Consumo</h4>
                                        </div>
                                        <div className="p-10 bg-white rounded-[4rem] shadow-2xl border border-slate-50">
                                            <canvas ref={chartRef}></canvas>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {modalType === 'downtime' && (
                                <div className="space-y-10 animate-fade-in">
                                    <div className="p-12 bg-red-50 rounded-[4rem] border-4 border-red-500 flex items-center gap-10 shadow-2xl shadow-red-100">
                                        <Icon name="alert" size={80} className="text-red-500 animate-pulse shrink-0"/>
                                        <div>
                                            <p className="text-3xl font-black text-red-600 uppercase tracking-tighter italic">Alerta de Falla</p>
                                            <p className="text-xs font-bold text-red-800 uppercase mt-3 leading-relaxed opacity-60">La unidad dejará de computar operatividad inmediatamente. Se notificará al Panel Central de Control.</p>
                                        </div>
                                    </div>
                                    <textarea className="w-full input-premium min-h-[260px] font-black text-red-600 uppercase text-sm border-red-200 shadow-inner" placeholder="Describa el fallo técnico, síntomas o piezas afectadas para el servicio técnico..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                    <button onClick={handleConfirmDowntime} className="w-full p-10 bg-red-600 text-white font-black rounded-[2.5rem] text-2xl uppercase tracking-widest border-4 border-red-800 shadow-2xl hover:bg-red-700 transition-all">Emitir Orden de Parada</button>
                                </div>
                            )}

                            {modalType === 'qr' && (
                                <div className="space-y-14 text-center flex flex-col items-center animate-fade-in py-10">
                                    <div className="p-16 bg-white rounded-[4rem] shadow-2xl border-4 border-slate-900" id={`qr-container-${activeVehicleId}`}></div>
                                    <div className="space-y-4">
                                        <p className="text-[11px] font-black uppercase italic text-slate-300 tracking-[0.3em] leading-relaxed">Identificador Único BND</p>
                                        <p className="text-xs font-bold text-slate-400 max-w-sm">Coloque esta etiqueta en el chasis o cabina para acceso rápido vía escáner.</p>
                                    </div>
                                    <button onClick={() => window.print()} className="btn-premium px-24 py-7 text-lg uppercase tracking-widest shadow-2xl">Imprimir Etiqueta</button>
                                </div>
                            )}

                            {modalType === 'historical' && (
                                <div className="space-y-10 animate-fade-in leading-none">
                                    <div className="p-8 bg-slate-100 rounded-[2rem] border border-slate-200 font-black text-xs uppercase italic text-slate-400 text-center tracking-widest">Sincronización de registros históricos del equipo.</div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                        <div className="space-y-3"><label className="text-[11px] font-black uppercase text-slate-400 italic ml-4">Fecha Operativa</label><input className="w-full input-premium" type="date" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} /></div>
                                        <div className="space-y-3"><label className="text-[11px] font-black uppercase text-slate-400 italic ml-4">Horómetro Acumulado</label><input className="w-full input-premium mono" type="number" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} /></div>
                                    </div>
                                    <button onClick={handleDailyLog} className="btn-premium w-full p-8 text-sm uppercase tracking-widest mt-4 shadow-2xl">Sincronizar Datos</button>
                                </div>
                            )}
                        </Modal>
                    )}

                    {scannerActive && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/98 flex items-center justify-center p-6 animate-fade-in">
                            <div className="w-full max-w-md space-y-12 text-center">
                                <div id="reader" className="shadow-2xl rounded-[4rem] border-[12px] border-yellow-400 bg-black overflow-hidden aspect-square"></div>
                                <button onClick={() => { setScannerActive(false); if(scannerRef.current) scannerRef.current.stop(); }} className="px-20 py-7 bg-white text-slate-900 rounded-[2rem] font-black text-sm uppercase shadow-2xl hover:bg-red-600 hover:text-white transition-all">Cancelar Operación</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
