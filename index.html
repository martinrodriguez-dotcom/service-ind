<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BND Equipos | EAM Industrial Premium</title>
    
    <!-- LIBRERÍAS CORE -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS ESPECIALIZADAS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary-yellow: #fbbf24;
            --primary-dark: #0f172a;
            --bg-app: #f8fafc;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-app); 
            color: #1e293b; 
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.04);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.08);
            border-color: #cbd5e1;
        }

        .btn-premium {
            background: var(--primary-dark);
            color: white;
            font-weight: 700;
            border-radius: 0.85rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-premium:hover:not(:disabled) {
            background: #1e293b;
            transform: translateY(-1px);
        }

        .btn-accent {
            background: var(--primary-yellow);
            color: #000000;
            font-weight: 800;
            border-radius: 0.85rem;
            box-shadow: 0 4px 12px -2px rgba(251, 191, 36, 0.3);
            transition: all 0.2s;
        }

        .input-premium {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.85rem 1.25rem;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .input-premium:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1);
        }

        .fuel-tank-container {
            width: 100px;
            height: 55px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .workflow-step {
            padding: 8px 12px;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #94a3b8;
        }

        .workflow-step.active {
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transform: scale(1.05);
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media (max-width: 1024px) {
            .sidebar-mobile {
                position: fixed;
                left: 0; top: 0; height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                background: white;
                width: 280px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.05);
            }
            .sidebar-mobile.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_RnRMxTrKDcNtyLfPRxHxVpqnKhTFemQ",
            authDomain: "service-ind.firebaseapp.com",
            projectId: "service-ind",
            storageBucket: "service-ind.firebasestorage.app",
            messagingSenderId: "659187337339",
            appId: "1:659187337339:web:ad95e28d129883de4dfade"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.db = db;
            window.auth = auth;
            window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
            window.appId = "bnd-pro-final-premium-v1"; 
            
            const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.warn("Auth fallback active");
                }
                window.dispatchEvent(new Event('firebase-ready'));
            };
            initAuth();
        } catch (error) {
            console.error("Firebase Error:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- SISTEMA DE ICONOS ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 11h7v10H3V11z" strokeWidth="2"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" strokeWidth="2.5"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" strokeWidth="2"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2" strokeWidth="2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z" strokeWidth="2"/>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeWidth="2"/>,
                chevronLeft: <path d="M15 18l-6-6 6-6" strokeWidth="2.5"/>,
                x: <path d="M18 6L6 18M6 6l12 12" strokeWidth="2.5"/>,
                check: <path d="M20 6L9 17l-5-5" strokeWidth="2.5"/>,
                fuel: <React.Fragment><path d="M3 22V8c0-2.1 1.7-3.8 3.8-3.8h7.5c2.1 0 3.8 1.7 3.8 3.8v14M4 9h13"/><path d="M19 8h1a2 2 0 012 2v6a2 2 0 01-2 2h-1M19 18h2"/><circle cx="10" cy="13" r="3"/></React.Fragment>,
                history: <React.Fragment><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 11.5 4m-.5 5v-5h5"/></React.Fragment>,
                menu: <path d="M3 12h18M3 6h18M3 18h18" strokeWidth="2.5" />,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                chart: <path d="M18 20V10M12 20V4M6 20v-6" strokeWidth="2" />,
                qr: <React.Fragment><rect x="3" y="3" width="7" height="7" strokeWidth="2"/><rect x="14" y="3" width="7" height="7" strokeWidth="2"/><rect x="3" y="14" width="7" height="7" strokeWidth="2"/><path d="M14 14h3v3h-3v-3zm3 3h3v3h-3v-3zm-3 3h3v-3" strokeWidth="2"/></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9" strokeWidth="2" />,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 000.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" strokeWidth="2"/></React.Fragment>,
                calendar: <React.Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" strokeWidth="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></React.Fragment>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        // --- COMPONENTE MODAL ---
        const ModalComp = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 animate-fade-in leading-none">
                <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-md" onClick={onClose} />
                <div className="relative w-full max-w-xl bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-white/20">
                    <div className="px-8 py-5 border-b flex justify-between items-center bg-slate-50/50">
                        <h3 className="text-lg font-extrabold text-slate-800 tracking-tight uppercase leading-none">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full transition-all text-slate-400 leading-none"><Icon name="x" size={20} /></button>
                    </div>
                    <div className="p-8 max-h-[85vh] overflow-y-auto leading-relaxed">{children}</div>
                </div>
            </div>
        );

        // --- TANQUE VISUAL ---
        const FuelTankCapsule = ({ capacity, current }) => {
            const perc = capacity > 0 ? Math.max(0, Math.min(100, (current / capacity) * 100)) : 0;
            let color = "#10b981"; 
            if (perc <= 50) color = "#f59e0b"; 
            if (perc <= 25) color = "#ef4444"; 

            return (
                <div className="flex flex-col items-center gap-1.5 leading-none">
                    <div className="fuel-tank-container">
                        <svg viewBox="0 0 140 80" className="w-full h-full">
                            <defs>
                                <linearGradient id="tankGradPremiumDelicate" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stopColor={color} stopOpacity="0.6" />
                                    <stop offset="100%" stopColor={color} stopOpacity="1" />
                                </linearGradient>
                            </defs>
                            <rect x="10" y="10" width="120" height="60" rx="30" fill="#f8fafc" stroke="#e2e8f0" strokeWidth="2" />
                            <clipPath id="tankClipDelicate">
                                <rect x="10" y={70 - (perc * 0.6)} width="120" height={perc * 0.6} rx="2" />
                            </clipPath>
                            <rect x="10" y="10" width="120" height="60" rx="30" fill="url(#tankGradPremiumDelicate)" clipPath="url(#tankClipDelicate)" />
                            <text x="70" y="45" textAnchor="middle" className="font-bold text-[12px] mono" fill={perc < 45 ? "#64748b" : "white"}>{perc.toFixed(0)}%</text>
                        </svg>
                    </div>
                    <span className="text-[9px] font-bold uppercase text-slate-400 italic tracking-widest leading-none">{Math.floor(current)} L</span>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompanyId, setSelectedCompanyId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [expandedVehicles, setExpandedVehicles] = useState(new Set());
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            const [scannerActive, setScannerActive] = useState(false);
            const scannerRef = useRef(null);
            const chartRef = useRef(null);

            const [bndSettings, setBndSettings] = useState({
                name: "BND EQUIPOS S.A.",
                description: "Mantenimiento Industrial & Gestión de Activos Críticos",
                address: "Parque Logístico BND, Nave 4",
                phone: "+54 9 11 1234-5678",
                email: "tecnica@bndequipos.com",
                web: "www.bndequipos.com"
            });

            const [form, setForm] = useState({ 
                nombre: '', cuit: '', responsable: '', mail: '', tel: '',
                marca: '', modelo: '', serie: '', patente: '', año: '', serviceInterval: 250, 
                horometro: '', horas: '', litros: '', nota: '', motivo: '', tankCapacity: 1000,
                insumos: [], insumoManual: '', fecha: new Date().toISOString().split('T')[0]
            });

            // --- SINCRONIZACIÓN FIREBASE ---
            useEffect(() => {
                const initSync = () => {
                    if (!window.fb || !window.auth) return;
                    window.fb.onAuthStateChanged(window.auth, (u) => {
                        setUser(u);
                        if (u) {
                            const configRef = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info");
                            window.fb.getDoc(configRef).then(snap => { if(snap.exists()) setBndSettings(snap.data()); });

                            const q = window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies");
                            const unsub = window.fb.onSnapshot(q, (snapshot) => {
                                setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                setLoading(false);
                            });
                            return () => unsub();
                        } else { setLoading(false); }
                    });
                };
                if (window.db) initSync();
                else window.addEventListener('firebase-ready', initSync);
            }, []);

            // --- LÓGICA DE ALERTAS ---
            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    const fuelPerc = ((emp.currentFuel || 0) / (emp.tankCapacity || 1000)) * 100;
                    if (fuelPerc <= 25) list.push({ type: 'FUEL', companyName: emp.nombre, companyId: emp.id, value: fuelPerc.toFixed(1) });
                    
                    (emp.vehiculos || []).forEach(veh => {
                        if (!veh.operativo) {
                            list.push({ 
                                type: 'BREAKDOWN', 
                                ...veh, 
                                companyId: emp.id, 
                                companyName: emp.nombre,
                                workflowStatus: veh.workflowStatus || 'PENDIENTE',
                                breakageMotive: veh.eventos?.slice().reverse().find(e => e.tipo === 'BAJA')?.motivo || "Sin motivo registrado"
                            });
                        }
                        const rest = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        if (rest < 50 && veh.operativo) list.push({ type: 'MAINTENANCE', ...veh, companyId: emp.id, companyName: emp.nombre, rest });
                    });
                });
                return list.sort((a,b) => (a.type === 'BREAKDOWN' ? -1 : 1));
            }, [companies]);

            // --- PROYECCIONES ---
            const projectionsData = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const regs = (veh.eventos || []).filter(e => e.tipo === 'REGISTRO').sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
                        let avg = 0;
                        if (regs.length >= 2) {
                            const first = regs[0]; const last = regs[regs.length - 1];
                            const diffHs = (parseFloat(last.horas) || 0) - (parseFloat(first.horas) || 0);
                            const diffDays = Math.max(1, (new Date(last.fecha) - new Date(first.fecha)) / 86400000);
                            avg = diffHs / diffDays;
                        }
                        const restHs = (parseFloat(veh.serviceInterval) || 250) - ((parseFloat(veh.horometroTotal) || 0) - (parseFloat(veh.ultimoServiceHoras) || 0));
                        let dateEst = null;
                        if (avg > 0 && restHs > 0) {
                            dateEst = new Date(); dateEst.setDate(dateEst.getDate() + Math.ceil(restHs / avg));
                        }
                        list.push({ ...veh, empresaNombre: emp.nombre, companyId: emp.id, estDate: dateEst, avgUsage: avg, restHs: restHs });
                    });
                });
                return list.sort((a,b) => (a.estDate || Infinity) - (b.estDate || Infinity));
            }, [companies]);

            const activeCompany = useMemo(() => companies.find(c => c.id === selectedCompanyId), [companies, selectedCompanyId]);

            // --- GRÁFICOS ---
            useEffect(() => {
                if (modalType === 'details' && activeCompany && chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    let allEvents = activeCompany.vehiculos.flatMap(v => (v.eventos || []).filter(e => e.litros > 0));
                    const labels = Array.from({length: 6}, (_, i) => {
                        const d = new Date(); d.setMonth(d.getMonth() - (5 - i));
                        return d.toISOString().substring(0, 7);
                    });
                    const dataPoints = labels.map(m => allEvents.filter(e => e.fecha && e.fecha.startsWith(m)).reduce((sum, e) => sum + parseFloat(e.litros || 0), 0));
                    if (window.myChartCompV3) window.myChartCompV3.destroy();
                    window.myChartCompV3 = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels.map(m => ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"][parseInt(m.split('-')[1])-1]),
                            datasets: [{ label: 'Diésel (L)', data: dataPoints, borderColor: '#fbbf24', backgroundColor: 'rgba(251, 191, 36, 0.05)', fill: true, tension: 0.4, borderWidth: 3 }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }
            }, [modalType, activeCompany]);

            // --- MANEJADORES ---
            const saveBndSettings = async () => {
                await window.fb.setDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info"), bndSettings);
                setActiveTab('dashboard');
            };

            const handleDailyLog = async () => {
                if (!form.horas || !form.litros) return;
                const h = parseFloat(form.horas); const l = parseFloat(form.litros);
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, horometroTotal: h, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'REGISTRO', fecha: form.fecha, horas: h, litros: l, nota: form.nota }] } : v);
                const newFuel = Math.max(0, (activeCompany.currentFuel || 0) - l);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated, currentFuel: newFuel });
                setModalType(null); setForm({ ...form, horas: '', litros: '', nota: '' });
            };

            const handleToggleStatus = async (vId, currentStatus) => {
                if(currentStatus) { setActiveVehicleId(vId); setModalType('downtime'); }
                else {
                    const updated = activeCompany.vehiculos.map(v => v.id === vId ? { ...v, operativo: true, workflowStatus: 'PENDIENTE', eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'ALTA', fecha: new Date().toLocaleDateString(), nota: 'Revivir Unidad' }] } : v);
                    await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                }
            };

            const handleConfirmDowntime = async () => {
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, operativo: false, workflowStatus: 'PENDIENTE', eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'BAJA', fecha: new Date().toLocaleDateString(), motivo: form.motivo }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null); setForm({...form, motivo: ''});
            };

            const handleUpdateWorkflow = async (cId, vId, newStatus) => {
                if (newStatus === 'REPARADO') {
                    setActiveVehicleId(vId); setSelectedCompanyId(cId); setModalType('repair_finish');
                    return;
                }
                const company = companies.find(c => c.id === cId);
                const updated = company.vehiculos.map(v => v.id === vId ? { ...v, workflowStatus: newStatus } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", cId), { vehiculos: updated });
            };

            const handleRepairSubmit = async () => {
                const company = companies.find(c => c.id === selectedCompanyId);
                const updated = company.vehiculos.map(v => v.id === activeVehicleId ? { ...v, operativo: true, workflowStatus: 'PENDIENTE', eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'REPARACION', fecha: new Date().toLocaleDateString(), nota: form.nota }] } : v);

                                <div className="glass-card p-10 space-y-8 leading-none shadow-2xl shadow-slate-100">
                                    <div className="grid grid-cols-1 gap-6 leading-none">
                                        <div className="space-y-2 leading-none"><label className="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2 leading-none ml-2 leading-none"><Icon name="user" size={12}/> Razón Social</label><input className="w-full input-premium font-black text-lg shadow-sm" value={bndSettings.name} onChange={e => setBndSettings({...bndSettings, name: e.target.value})} /></div>
                                        <div className="space-y-2 leading-none"><label className="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2 leading-none ml-2 leading-none"><Icon name="dashboard" size={12}/> Eslogan Corporativo</label><input className="w-full input-premium shadow-sm" value={bndSettings.description} onChange={e => setBndSettings({...bndSettings, description: e.target.value})} /></div>
                                        <div className="space-y-2 leading-none"><label className="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2 leading-none ml-2 leading-none"><Icon name="user" size={12}/> Dirección Administrativa</label><input className="w-full input-premium shadow-sm" value={bndSettings.address} onChange={e => setBndSettings({...bndSettings, address: e.target.value})} /></div>
                                        <div className="grid grid-cols-2 gap-6 leading-none leading-none">
                                            <div className="space-y-2 leading-none"><label className="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2 leading-none ml-2 leading-none"><Icon name="user" size={12}/> Teléfono Soporte</label><input className="w-full input-premium shadow-sm" value={bndSettings.phone} onChange={e => setBndSettings({...bndSettings, phone: e.target.value})} /></div>
                                            <div className="space-y-2 leading-none"><label className="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2 leading-none ml-2 leading-none"><Icon name="user" size={12}/> Email Técnico</label><input className="w-full input-premium shadow-sm" value={bndSettings.email} onChange={e => setBndSettings({...bndSettings, email: e.target.value})} /></div>
                                        </div>
                                    </div>
                                    <button onClick={saveBndSettings} className="btn-premium w-full p-6 text-[11px] uppercase tracking-widest shadow-xl shadow-slate-200">Impactar Datos de Membrete</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- MODALES --- */}
                    {modalType && (
                        <Modal title={
                            modalType === 'company' ? "Nuevo Registro de Cliente" : 
                            modalType === 'vehicle' ? "Vincular Maquinaria" : 
                            modalType === 'log' ? "Bitácora Operativa" : 
                            modalType === 'details' ? "Analítica de Flota" : 
                            modalType === 'service' ? "Protocolo Service" : 
                            modalType === 'qr' ? "Etiqueta QR" :
                            modalType === 'historical' ? "Carga Manual" :
                            modalType === 'repair_finish' ? "Cierre de Reparación" :
                            modalType === 'downtime' ? "Orden Parada" : "BND"
                        } onClose={() => setModalType(null)}>
                            
                            {modalType === 'company' && (
                                <div className="space-y-6 leading-none">
                                    <div className="space-y-1 leading-none"><label className="text-[9px] font-black uppercase text-slate-400 italic ml-2 leading-none">Nombre Comercial</label><input className="w-full input-premium font-black uppercase shadow-sm" placeholder="Razón Social" onChange={e => setForm({...form, nombre: e.target.value})} /></div>
                                    <div className="grid grid-cols-2 gap-4 leading-none"><input className="w-full input-premium shadow-sm" placeholder="CUIT" onChange={e => setForm({...form, cuit: e.target.value})} /><input className="w-full input-premium shadow-sm" placeholder="Responsable" onChange={e => setForm({...form, responsable: e.target.value})} /></div>
                                    <div className="space-y-1 leading-none"><label className="text-[9px] font-black uppercase text-slate-400 italic ml-2 leading-none">Capacidad Depósito (Lts)</label><input type="number" className="w-full input-premium shadow-sm" placeholder="Ej: 1000" onChange={e => setForm({...form, tankCapacity: e.target.value})} /></div>
                                    <button onClick={handleAddCompany} className="btn-accent w-full p-4 text-[9px] uppercase shadow-lg mt-4 leading-none">Confirmar Registro</button>
                                </div>
                            )}

                            {modalType === 'log' && (
                                <div className="space-y-6 text-center leading-none leading-none animate-fade-in">
                                    <div className="grid grid-cols-2 gap-6 leading-none">
                                        <div className="space-y-2 leading-none">
                                            <label className="text-[9px] font-black text-slate-400 uppercase italic leading-none">Lectura Horómetro</label>
                                            <div className="relative">
                                                <div className="absolute top-2 right-4 text-[10px] font-bold text-slate-300 uppercase leading-none">Ant: {activeCompany?.vehiculos?.find(v => v.id === activeVehicleId)?.horometroTotal || 0}</div>
                                                <input className="w-full p-6 input-premium mono text-3xl text-center shadow-inner leading-none" type="number" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="space-y-2 leading-none">
                                            <label className="text-[9px] font-black text-slate-400 uppercase italic leading-none">Carga Diésel (L)</label>
                                            <input className="w-full p-6 input-premium mono text-3xl text-center shadow-inner leading-none" type="number" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} />
                                        </div>
                                    </div>
                                    <textarea className="w-full input-premium min-h-[100px] font-bold text-[10px] uppercase shadow-inner leading-none" placeholder="Informe diario de unidad..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    <button disabled={!form.horas || !form.litros} onClick={handleDailyLog} className="btn-accent w-full p-5 text-[10px] uppercase shadow-lg mt-4 leading-none">Impactar Registro</button>
                                </div>
                            )}

                            {modalType === 'repair_finish' && (
                                <div className="space-y-6 animate-fade-in leading-none">
                                    <div className="p-6 bg-emerald-50 rounded-2xl border border-emerald-200 flex items-center gap-6 shadow-md leading-none leading-none shadow-emerald-50">
                                        <Icon name="check" size={40} className="text-emerald-600 shrink-0"/>
                                        <div className="leading-none leading-none"><p className="text-xl font-black text-emerald-600 uppercase italic leading-none">Confirmar Reparación</p><p className="text-[10px] font-bold text-emerald-500 uppercase mt-1 leading-none">La unidad volverá a estar operativa.</p></div>
                                    </div>
                                    <textarea className="w-full input-premium min-h-[140px] font-bold uppercase text-[10px] leading-none" placeholder="Detalle qué repuestos se cambiaron o qué trabajo se hizo para resolver la rotura..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    <button onClick={handleRepairSubmit} className="btn-accent w-full p-5 text-[10px] uppercase shadow-lg shadow-yellow-100 leading-none">Finalizar Intervención</button>
                                </div>
                            )}

                            {modalType === 'downtime' && (
                                <div className="space-y-6 animate-fade-in leading-none">
                                    <div className="p-6 bg-red-100 rounded-2xl border border-red-200 flex items-center gap-6 shadow-md leading-none shadow-red-50">
                                        <Icon name="alert" size={40} className="text-red-600 animate-pulse shrink-0"/>
                                        <p className="text-md font-black text-red-600 uppercase tracking-tighter leading-none italic leading-none">Reportar Rotura Crítica</p>
                                    </div>
                                    <textarea className="w-full input-premium min-h-[160px] font-black text-red-600 uppercase text-[10px] border-red-100 shadow-inner leading-none leading-none" placeholder="Describa el motivo de la falla mecánica observada..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                    <button onClick={handleConfirmDowntime} className="w-full p-4 bg-red-600 text-white font-black rounded-xl text-xs leading-none uppercase tracking-widest border border-red-800 shadow-lg leading-none shadow-red-200">Notificar Panel de Alertas</button>
                                </div>
                            )}

                            {modalType === 'qr' && (
                                <div className="space-y-8 text-center flex flex-col items-center py-4 leading-none">
                                    <div className="p-8 bg-white rounded-3xl shadow-xl border border-slate-100 leading-none shadow-slate-100" id={`qr-container-delicate-vFinal-v2-${activeVehicleId}`}></div>
                                    <div className="space-y-1.5 leading-none leading-none">
                                        <p className="text-[9px] font-black uppercase text-slate-300 italic tracking-widest leading-none">ID BND-{activeVehicleId?.slice(-4)}</p>
                                        <p className="text-[10px] font-bold text-slate-400 max-w-[200px] leading-relaxed leading-none leading-none">Etiqueta de acceso rápido para cabina.</p>
                                    </div>
                                    <button onClick={() => window.print()} className="btn-premium px-12 py-3.5 text-[10px] uppercase leading-none shadow-md leading-none">Imprimir</button>
                                </div>
                            )}
                        </Modal>
                    )}

                    {scannerActive && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/98 flex items-center justify-center p-6 animate-fade-in leading-none">
                            <div className="w-full max-w-md space-y-8 text-center leading-none">
                                <div id="reader" className="shadow-2xl rounded-3xl border-[6px] border-yellow-400 bg-black overflow-hidden aspect-square leading-none shadow-yellow-100"></div>
                                <button onClick={() => { setScannerActive(false); if(scannerRef.current) scannerRef.current.stop(); }} className="px-10 py-4 bg-white text-slate-900 rounded-xl font-black text-[10px] uppercase shadow-2xl hover:bg-red-600 hover:text-white transition-all leading-none shadow-white/10">Cancelar</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
