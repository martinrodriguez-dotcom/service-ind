<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gestión de Equipos BND | Sistema EAM Profesional</title>
    
    <!-- LIBRERÍAS CORE -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- LIBRERÍAS ESPECIALIZADAS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-light); 
            color: #1e293b; 
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        .dark body { background-color: #020617; color: #f1f5f9; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.85);
            border-color: rgba(30, 41, 59, 0.8);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .btn-modern {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s;
        }

        .btn-modern:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-modern:active { transform: scale(0.98); }

        .input-modern {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .dark .input-modern { background: #1e293b; color: white; }
        .input-modern:focus {
            background: white;
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; }

        .history-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }
        .history-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        @media (max-width: 1024px) {
            .sidebar-mobile {
                position: fixed;
                left: 0; top: 0; height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar-mobile.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>

    <!-- FIREBASE INITIALIZATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        // --- CONFIGURACIÓN DE SEGURIDAD ---
        // Verificación segura de __firebase_config para evitar errores en navegadores externos
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                return JSON.parse(__firebase_config);
            }
            // Retornamos null para que la app maneje el estado de "Sin Configuración"
            return null;
        };

        const config = getFirebaseConfig();
        
        if (config) {
            try {
                const app = initializeApp(config);
                const db = getFirestore(app);
                const auth = getAuth(app);
                
                window.db = db;
                window.auth = auth;
                window.fb = { collection, onSnapshot, addDoc, updateDoc, doc, arrayUnion, query, setDoc, getDoc, deleteDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
                window.appId = typeof __app_id !== 'undefined' ? __app_id : 'bnd-equipos-pro';
                
                // REGLA 3: Autenticación obligatoria antes de cualquier consulta
                const startAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    window.dispatchEvent(new Event('firebase-ready'));
                };
                startAuth().catch(e => console.error("Error Auth:", e));
                
            } catch (error) {
                console.error("Error inicialización Firebase:", error);
            }
        } else {
            // Caso Netlify/Navegador externo sin config inyectada
            window.firebaseMissing = true;
            window.dispatchEvent(new Event('firebase-ready'));
        }
    </script>

    <!-- REACT APPLICATION -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const SERVICE_INTERVAL_DEFAULT = 250;

        // --- COMPONENTE MODAL ---
        const Modal = ({ title, onClose, children }) => (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 animate-fade-in">
                <div className="absolute inset-0 bg-slate-950/70 backdrop-blur-md" onClick={onClose} />
                <div className="relative w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden leading-none border dark:border-slate-800">
                    <div className="px-8 py-6 border-b dark:border-slate-800 flex justify-between items-center bg-white/50 dark:bg-slate-900/50 leading-none">
                        <h3 className="text-xl font-extrabold text-slate-800 dark:text-white tracking-tight uppercase italic leading-none">{title}</h3>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all text-slate-400 leading-none"><Icon name="x" size={24} /></button>
                    </div>
                    <div className="p-8 max-h-[85vh] overflow-y-auto leading-none">{children}</div>
                </div>
            </div>
        );

        // --- SISTEMA DE ICONOS SVG ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm0 11h7v7h-7v-7zM3 11h7v10H3V11z" strokeWidth="2"/>,
                company: <path d="M3 21h18M3 7v14M21 7v14M9 21V11h6v10M2 7l10-5 10 5" strokeWidth="2"/>,
                plus: <path d="M12 5v14M5 12h14" strokeWidth="2.5"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01" strokeWidth="2"/>,
                truck: <path d="M14 18V6a2 2 0 00-2-2H4a2 2 0 00-2 2v11a1 1 0 001 1h2m15-5V2v11a1 1 0 01-1 1h-2" strokeWidth="2"/>,
                wrench: <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z" strokeWidth="2"/>,
                clock: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></React.Fragment>,
                download: <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeWidth="2"/>,
                chevronLeft: <path d="M15 18l-6-6 6-6" strokeWidth="2.5"/>,
                x: <path d="M18 6L6 18M6 6l12 12" strokeWidth="2.5"/>,
                check: <path d="M20 6L9 17l-5-5" strokeWidth="2.5"/>,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 000.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" strokeWidth="2"/></React.Fragment>,
                fuel: <React.Fragment><path d="M3 22V8c0-2.1 1.7-3.8 3.8-3.8h7.5c2.1 0 3.8 1.7 3.8 3.8v14M4 9h13"/><path d="M19 8h1a2 2 0 012 2v6a2 2 0 01-2 2h-1M19 18h2"/><circle cx="10" cy="13" r="3"/></React.Fragment>,
                calendar: <React.Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" strokeWidth="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></React.Fragment>,
                qr: <React.Fragment><rect x="3" y="3" width="7" height="7" strokeWidth="2"/><rect x="14" y="3" width="7" height="7" strokeWidth="2"/><rect x="3" y="14" width="7" height="7" strokeWidth="2"/><path d="M14 14h3v3h-3v-3zm3 3h3v3h-3v-3zm-3 3h3v-3" strokeWidth="2"/></React.Fragment>,
                history: <React.Fragment><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 11.5 4m-.5 5v-5h5"/></React.Fragment>,
                chevronDown: <polyline points="6 9 12 15 18 9"/>,
                hash: <path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18" strokeWidth="2"/>,
                menu: <path d="M3 12h18M3 6h18M3 18h18" strokeWidth="2.5" />,
                user: <React.Fragment><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></React.Fragment>,
                map: <React.Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" strokeWidth="2"/><circle cx="12" cy="10" r="3" strokeWidth="2"/></React.Fragment>,
                at: <React.Fragment><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 006 0v-1a10 10 0 10-3.92 7.94"/></React.Fragment>,
                phone: <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.81 12.81 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" strokeWidth="2"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedCompanyId, setSelectedCompanyId] = useState(null);
            const [darkMode, setDarkMode] = useState(false);
            const [loading, setLoading] = useState(true);
            const [companies, setCompanies] = useState([]);
            const [expandedVehicles, setExpandedVehicles] = useState(new Set());
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [modalType, setModalType] = useState(null);
            const [activeVehicleId, setActiveVehicleId] = useState(null);
            const [scannerActive, setScannerActive] = useState(false);
            const scannerRef = useRef(null);

            const [bndSettings, setBndSettings] = useState({
                name: "BND EQUIPOS S.A.",
                description: "Mantenimiento Industrial & Gestión de Activos",
                address: "Zona Industrial, Nave 14",
                phone: "+54 9 11 5555-0101",
                email: "tecnica@bndequipos.com",
                web: "www.bndequipos.com"
            });
            
            const [form, setForm] = useState({ 
                nombre: '', cuit: '', responsable: '', mail: '', tel: '',
                marca: '', modelo: '', serie: '', año: '', serviceInterval: 250, 
                horometro: '', horas: '', litros: '', nota: '', motivo: '',
                insumos: [], insumoManual: '', fecha: new Date().toISOString().split('T')[0],
                tipoHistorial: 'REGISTRO'
            });

            // --- SINCRONIZACIÓN FIREBASE ---
            useEffect(() => {
                const initSync = () => {
                    if (window.firebaseMissing) {
                        setLoading(false);
                        return;
                    }

                    if (!window.fb || !window.auth) return;
                    
                    const unsubscribeAuth = window.fb.onAuthStateChanged(window.auth, (u) => {
                        setUser(u);
                        if (u) {
                            const configRef = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info");
                            window.fb.getDoc(configRef).then(snap => { if(snap.exists()) setBndSettings(snap.data()); });

                            const q = window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies");
                            const unsubSnapshot = window.fb.onSnapshot(q, (snapshot) => {
                                setCompanies(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                setLoading(false);
                            }, (err) => { 
                                console.error("Snapshot Error:", err);
                                setLoading(false);
                            });
                            return () => unsubSnapshot();
                        } else {
                            setLoading(false);
                        }
                    });
                    return () => unsubscribeAuth();
                };

                if (window.db || window.firebaseMissing) initSync();
                else window.addEventListener('firebase-ready', initSync);
            }, []);

            const alerts = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const interval = veh.serviceInterval || SERVICE_INTERVAL_DEFAULT;
                        const rest = interval - ((veh.horometroTotal || 0) - (veh.ultimoServiceHoras || 0));
                        if (rest < 50 || !veh.operativo) {
                            list.push({ ...veh, companyId: emp.id, companyName: emp.nombre, rest });
                        }
                    });
                });
                return list.sort((a,b) => a.rest - b.rest);
            }, [companies]);

            const projections = useMemo(() => {
                let list = [];
                companies.forEach(emp => {
                    (emp.vehiculos || []).forEach(veh => {
                        const regs = (veh.eventos || []).filter(e => e.tipo === 'REGISTRO').sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
                        let avgUsage = 0;
                        if (regs.length >= 2) {
                            const first = regs[0]; const last = regs[regs.length - 1];
                            const diffHs = last.horas - first.horas;
                            const diffDs = Math.max(1, (new Date(last.fecha) - new Date(first.fecha)) / 86400000);
                            avgUsage = diffHs / diffDs;
                        }
                        const restHs = (veh.serviceInterval || 250) - (veh.horometroTotal - (veh.ultimoServiceHoras || 0));
                        let estDate = null;
                        if (avgUsage > 0 && restHs > 0) {
                            estDate = new Date();
                            estDate.setDate(estDate.getDate() + Math.ceil(restHs / avgUsage));
                        }
                        list.push({ ...veh, empresaNombre: emp.nombre, companyId: emp.id, estDate, avgUsage, restHs });
                    });
                });
                return list.sort((a,b) => (a.estDate || Infinity) - (b.estDate || Infinity));
            }, [companies]);

            const activeCompany = useMemo(() => companies.find(c => c.id === selectedCompanyId), [companies, selectedCompanyId]);

            // --- ACCIONES ---
            const saveBndSettings = async () => {
                if(!user) return;
                const configRef = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "config", "bnd_info");
                await window.fb.setDoc(configRef, bndSettings);
                setActiveTab('dashboard');
            };

            const downloadPDF = (company, vehicle) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const interval = vehicle.serviceInterval || 250;
                const hsCons = (vehicle.horometroTotal || 0) - (vehicle.ultimoServiceHoras || 0);
                const prog = Math.max(0, 100 - (hsCons / interval * 100));

                doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 45, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(26); doc.setFont("helvetica", "bold");
                doc.text(bndSettings.name.toUpperCase(), 15, 22);
                doc.setFontSize(9); doc.text(bndSettings.description, 15, 30);
                doc.setFontSize(8); doc.text(`Tel: ${bndSettings.phone} | ${bndSettings.email}`, 145, 28);
                doc.setFillColor(234, 88, 12); doc.rect(0, 45, 210, 2, 'F');

                doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.text("EXPEDIENTE TÉCNICO DE UNIDAD", 15, 60);
                doc.setFillColor(248, 250, 252); doc.rect(15, 65, 180, 25, 'F');
                doc.setFontSize(10); doc.setTextColor(71, 85, 105);
                doc.text(`CLIENTE: ${company.nombre.toUpperCase()}`, 20, 73);
                doc.text(`EQUIPO: ${vehicle.nombre}`, 20, 80);
                doc.text(`HORAS: ${vehicle.horometroTotal} HS`, 110, 73);
                doc.text(`CICLO: ${prog.toFixed(1)}%`, 110, 80);

                const tableData = (vehicle.eventos || []).slice().reverse().map(ev => [ev.fecha, ev.tipo, `${ev.horas || '-'} HS`, ev.litros || '-', ev.nota || ev.motivo || '-']);
                doc.autoTable({ startY: 95, head: [['FECHA', 'EVENTO', 'LECTURA', 'CARGA', 'DETALLE']], body: tableData, headStyles: { fillColor: [79, 70, 229] }, styles: { fontSize: 8 } });
                doc.save(`Expediente_${vehicle.nombre}.pdf`);
            };

            const handleAddCompany = async () => {
                if (!user) return;
                await window.fb.addDoc(window.fb.collection(window.db, "artifacts", window.appId, "public", "data", "companies"), { nombre: form.nombre, cuit: form.cuit, responsable: form.responsable, vehiculos: [] });
                setModalType(null); setForm({ ...form, nombre: '', cuit: '', responsable: '' });
            };

            const handleAddVehicle = async () => {
                if (!user || !activeCompany) return;
                const ref = window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id);
                const h = parseFloat(form.horometro) || 0;
                const v = { id: Date.now().toString(), ...form, horometroTotal: h, ultimoServiceHoras: h, operativo: true, eventos: [{ id: Date.now(), tipo: 'ALTA', fecha: new Date().toLocaleDateString(), horas: h, nota: 'Vinculación' }] };
                await window.fb.updateDoc(ref, { vehiculos: window.fb.arrayUnion(v) });
                setModalType(null);
            };

            const handleDailyLog = async () => {
                if (!user || !activeCompany) return;
                const h = parseFloat(form.horas);
                if (isNaN(h)) return;
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, horometroTotal: h, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'REGISTRO', fecha: form.fecha, horas: h, litros: form.litros, nota: form.nota }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null);
            };

            const handleHistoricalData = async () => {
                if (!user || !activeCompany) return;
                const h = parseFloat(form.horas);
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, horometroTotal: Math.max(v.horometroTotal, h), eventos: [...(v.eventos || []), { id: Date.now(), tipo: form.tipoHistorial, fecha: form.fecha, horas: h, litros: form.litros, nota: "(Historial) " + form.nota, insumos: form.insumos }] } : v);
                await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                setModalType(null);
            };

            const handleToggleStatus = async (vId, status) => {
                if (!user || !activeCompany) return;
                if(status) { setActiveVehicleId(vId); setModalType('downtime'); }
                else {
                    const updated = activeCompany.vehiculos.map(v => v.id === vId ? { ...v, operativo: true, eventos: [...v.eventos, { id: Date.now(), tipo: 'ALTA', fecha: new Date().toLocaleDateString(), nota: 'Reactivación' }] } : v);
                    await window.fb.updateDoc(window.fb.doc(window.db, "artifacts", window.appId, "public", "data", "companies", activeCompany.id), { vehiculos: updated });
                }
            };

            const handleConfirmDowntime = async () => {
                if (!activeCompany || !activeVehicleId) return;
                const updated = activeCompany.vehiculos.map(v => v.id === activeVehicleId ? { ...v, operativo: false, eventos: [...(v.eventos || []), { id: Date.now(), tipo: 'BAJA', fecha: new Date().toLocaleDateString(), motivo: form.motivo }] } : v);

                            <Modal title="Alta de Empresa" onClose={() => setModalType(null)}>
                                <div className="space-y-5 leading-none">
                                    <input className="w-full input-modern font-bold text-lg leading-none shadow-sm shadow-sm leading-none" placeholder="Razón Social del Cliente" onChange={e => setForm({...form, nombre: e.target.value})} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none"><input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="C.U.I.T." onChange={e => setForm({...form, cuit: e.target.value})} /><input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="Responsable" onChange={e => setForm({...form, responsable: e.target.value})} /></div>
                                    <button onClick={handleAddCompany} className="btn-modern w-full p-5 rounded-3xl mt-4 italic uppercase text-xs tracking-widest leading-none shadow-xl leading-none shadow-sm leading-none">Guardar Empresa</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'vehicle' && (
                            <Modal title="Vincular Maquinaria" onClose={() => setModalType(null)}>
                                <div className="space-y-6 leading-none">
                                    <input className="w-full input-modern font-bold text-xl uppercase italic text-indigo-600 shadow-sm leading-none shadow-sm leading-none" placeholder="Identificación del Equipo" onChange={e => setForm({...form, nombre: e.target.value})} />
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none leading-none">
                                        <input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="Marca" onChange={e => setForm({...form, marca: e.target.value})} />
                                        <input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="Modelo" onChange={e => setForm({...form, modelo: e.target.value})} />
                                        <input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="Nro de Serie" onChange={e => setForm({...form, serie: e.target.value})} />
                                        <input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" placeholder="Año" onChange={e => setForm({...form, año: e.target.value})} />
                                        <div className="space-y-1 leading-none leading-none"><label className="text-[10px] font-bold text-indigo-600 uppercase ml-2 italic leading-none mb-1 block leading-none leading-none leading-none">Ciclo HS</label><input className="w-full input-modern leading-none shadow-sm shadow-sm leading-none" type="number" defaultValue="250" onChange={e => setForm({...form, serviceInterval: e.target.value})} /></div>
                                        <div className="space-y-1 leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2 italic leading-none mb-1 block leading-none leading-none leading-none">Horómetro Actual</label><input className="w-full input-modern mono text-xl leading-none shadow-sm shadow-sm leading-none" type="number" placeholder="0.0" onChange={e => setForm({...form, horometro: e.target.value})} /></div>
                                    </div>
                                    <button onClick={handleAddVehicle} className="btn-modern w-full p-5 rounded-3xl mt-4 italic shadow-xl uppercase text-sm tracking-widest leading-none leading-none leading-none leading-none">Vincular Equipo</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'log' && (
                            <Modal title="Registrar Uso Diario" onClose={() => setModalType(null)}>
                                <div className="space-y-6 leading-none leading-none">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none leading-none"><div className="space-y-1 leading-none leading-none leading-none"><label className="text-[10px] font-bold text-indigo-500 uppercase ml-2 italic leading-none leading-none leading-none leading-none leading-none">Lectura Horómetro</label><input className="w-full p-6 rounded-2xl input-modern mono text-4xl text-center text-indigo-600 leading-none shadow-sm shadow-sm leading-none" type="number" autoFocus value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} /></div><div className="space-y-1 leading-none leading-none leading-none"><label className="text-[10px] font-bold text-amber-500 uppercase ml-2 italic leading-none leading-none leading-none leading-none leading-none">Combustible (Lts)</label><input className="w-full p-6 rounded-2xl input-modern mono text-4xl text-center text-amber-600 leading-none shadow-sm shadow-sm leading-none" type="number" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} /></div></div>
                                    <textarea className="w-full input-modern min-h-[100px] italic text-sm font-semibold leading-tight shadow-sm leading-none leading-none leading-none leading-none" placeholder="Notas del turno..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    <button onClick={handleDailyLog} className="btn-modern w-full p-6 rounded-3xl shadow-xl italic uppercase text-xs leading-none leading-none leading-none leading-none leading-none">Guardar Registro</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'historical' && (
                            <Modal title="Carga Histórica" onClose={() => setModalType(null)}>
                                <div className="space-y-6 leading-none leading-none">
                                    <div className="p-4 bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 rounded-2xl italic text-[10px] font-bold text-indigo-600 uppercase tracking-widest leading-tight leading-none leading-none leading-none leading-none">Calibración manual de registros pasados.</div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 leading-none leading-none">
                                        <select className="w-full input-modern text-xs font-bold leading-none shadow-sm shadow-sm leading-none" value={form.tipoHistorial} onChange={e => setForm({...form, tipoHistorial: e.target.value})}><option value="REGISTRO">USO (HORÓMETRO)</option><option value="SERVICE">SERVICE</option><option value="ALTA">ALTA</option></select>
                                        <input className="w-full input-modern text-xs uppercase font-bold leading-none shadow-sm shadow-sm leading-none" type="date" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                        <div className="space-y-1 leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 ml-2 italic uppercase leading-none leading-none leading-none leading-none leading-none leading-none">Horas</label><input className="w-full input-modern mono leading-none shadow-sm shadow-sm leading-none" type="number" value={form.horas} onChange={e => setForm({...form, horas: e.target.value})} /></div>
                                        <div className="space-y-1 leading-none leading-none"><label className="text-[10px] font-bold text-slate-400 ml-2 italic uppercase leading-none leading-none leading-none leading-none leading-none leading-none">Combustible</label><input className="w-full input-modern mono leading-none shadow-sm shadow-sm leading-none" type="number" value={form.litros} onChange={e => setForm({...form, litros: e.target.value})} /></div>
                                    </div>
                                    <button onClick={handleHistoricalData} className="btn-modern w-full p-5 rounded-3xl shadow-xl italic uppercase text-xs leading-none leading-none leading-none leading-none leading-none">Sincronizar Datos</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'service' && (
                            <Modal title="Certificar Service" onClose={() => setModalType(null)}>
                                <div className="space-y-6 leading-none leading-none">
                                    <div className="p-6 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 rounded-3xl text-center shadow-inner leading-none leading-none leading-none leading-none leading-none"><p className="text-[10px] font-bold text-emerald-600 uppercase mb-1 leading-none italic leading-none leading-none leading-none leading-none leading-none">Reinicio de Ciclo</p><p className="mono text-3xl font-black text-emerald-700 italic leading-none leading-none leading-none leading-none leading-none">HS {activeCompany?.vehiculos?.find(v => v.id === activeVehicleId)?.horometroTotal?.toLocaleString() || '0'}</p></div>
                                    <div className="space-y-4 leading-none leading-none leading-none leading-none leading-none"><label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest ml-2 italic leading-none leading-none leading-none leading-none leading-none">Insumos Reemplazados</label><div className="flex flex-wrap gap-2 leading-none leading-none leading-none leading-none leading-none">{['Filtro Aceite', 'Filtro Aire', 'Filtro Combustible', 'Aceite 15W40', 'Grasa Litio'].map(item => (<button key={item} onClick={() => setForm(prev => ({ ...prev, insumos: prev.insumos.includes(item) ? prev.insumos.filter(i => i !== item) : [...prev.insumos, item] }))} className={`px-3 py-2 rounded-xl border-2 font-bold text-[10px] transition-all italic uppercase leading-none leading-none leading-none leading-none leading-none ${form.insumos.includes(item) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 dark:bg-slate-800 text-slate-500'}`}>{item}</button>))}</div><div className="flex gap-2 p-2 bg-slate-50 dark:bg-slate-800 rounded-2xl border leading-none leading-none leading-none leading-none leading-none leading-none"><input className="flex-1 bg-transparent px-4 py-2 text-xs font-bold focus:outline-none leading-none leading-none leading-none leading-none leading-none" placeholder="Otro..." value={form.insumoManual} onChange={e => setForm({...form, insumoManual: e.target.value})} /><button onClick={() => { if(form.insumoManual) setForm(prev => ({ ...prev, insumos: [...prev.insumos, form.insumoManual.toUpperCase()], insumoManual: '' })); }} className="w-10 h-10 bg-indigo-600 text-white rounded-xl shadow-lg leading-none transition-all active:scale-95 flex items-center justify-center font-bold leading-none leading-none leading-none">+</button></div></div>
                                    <textarea className="w-full input-modern min-h-[120px] italic font-semibold text-sm leading-tight leading-none leading-none leading-none shadow-sm leading-none shadow-sm leading-none" placeholder="Detalle técnico..." value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} />
                                    <button onClick={handleServiceReset} className="btn-modern w-full p-5 rounded-3xl italic shadow-2xl leading-none uppercase text-xs leading-none leading-none leading-none leading-none leading-none">Certificar Mantenimiento</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'downtime' && (
                            <Modal title="Certificar Parada" onClose={() => setModalType(null)}>
                                <div className="space-y-5 leading-none leading-none">
                                    <div className="p-4 bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-900/50 rounded-2xl flex items-center gap-3 leading-none leading-none leading-none leading-none leading-none leading-none"><Icon name="alert" size={24} className="text-rose-600 animate-pulse shrink-0"/><p className="text-[10px] font-bold text-rose-600 uppercase tracking-widest leading-tight leading-none leading-none leading-none leading-none">La unidad cambiará a estado NO OPERATIVO inmediatamente.</p></div>
                                    <textarea className="w-full input-modern min-h-[150px] italic font-semibold leading-tight leading-none shadow-sm leading-none leading-none leading-none shadow-sm leading-none" placeholder="Motivo de la avería..." value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} />
                                    <button onClick={handleConfirmDowntime} className="w-full p-5 bg-rose-600 hover:bg-rose-700 rounded-3xl font-bold text-white shadow-xl transition-all uppercase text-[10px] tracking-widest italic leading-none leading-none leading-none leading-none leading-none">Emitir Orden de Parada</button>
                                </div>
                            </Modal>
                        )}

                        {modalType === 'qr' && (
                            <Modal title="Identificador de Unidad" onClose={() => setModalType(null)}>
                                <div className="space-y-8 text-center flex flex-col items-center leading-none leading-none leading-none leading-none leading-none">
                                    <div className="p-6 bg-white rounded-[2.5rem] shadow-2xl border-4 border-indigo-600 leading-none shadow-indigo-100 leading-none leading-none leading-none leading-none" id={`qr-container-${activeVehicleId}`}></div>
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-[10px] italic leading-relaxed max-w-sm leading-none leading-none leading-none leading-none">Imprima esta etiqueta y colóquela en la unidad para acceso rápido.</p>
                                    <button onClick={() => window.print()} className="btn-modern px-10 py-4 rounded-2xl italic shadow-xl text-sm leading-none uppercase tracking-widest font-bold leading-none leading-none leading-none leading-none">Imprimir Etiqueta</button>
                                </div>
                            </Modal>
                        )}

                        {scannerActive && (
                            <div className="fixed inset-0 z-[200] bg-slate-950/95 flex items-center justify-center p-8 animate-fade-in leading-none leading-none leading-none leading-none leading-none">
                                <div className="w-full max-w-md space-y-8 text-center leading-none leading-none leading-none leading-none leading-none">
                                    <div id="reader" className="shadow-2xl border-4 border-indigo-600 bg-black leading-none leading-none leading-none leading-none leading-none"></div>
                                    <button onClick={() => { setScannerActive(false); if(scannerRef.current) scannerRef.current.stop(); }} className="px-12 py-5 bg-white rounded-3xl font-black text-xs uppercase leading-none hover:bg-rose-600 leading-none leading-none leading-none">Cerrar</button>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
